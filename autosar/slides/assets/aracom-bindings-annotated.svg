<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 620" width="960" height="620" font-family="Helvetica, Arial, sans-serif">
  <rect x="0" y="0" width="960" height="620" fill="#ffffff"/>

  <defs>
    <marker id="arr" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L9,3 L0,6 z" fill="#444"/>
    </marker>
  </defs>

  <!-- Title -->
  <text x="480" y="38" text-anchor="middle" font-size="26" font-weight="700" fill="#1b2b4a">ara::com — one API, several bindings underneath</text>

  <!-- ===================== Layer 1: Adaptive Application ===================== -->
  <rect x="180" y="66" width="600" height="58" rx="8" fill="#EAF1FB" stroke="#9BBCE0" stroke-width="1.5"/>
  <text x="480" y="90" text-anchor="middle" font-size="14" font-weight="700" fill="#223344">Adaptive Application</text>
  <text x="480" y="110" text-anchor="middle" font-size="10" fill="#223344">codes against proxies (client-side) and skeletons (server-side)</text>
  <line x1="480" y1="124" x2="480" y2="134" stroke="#444" stroke-width="2" marker-end="url(#arr)"/>

  <!-- ===================== Layer 2: ara::com API line ===================== -->
  <rect x="180" y="136" width="600" height="34" rx="6" fill="#7f9dc9" stroke="#5f82b8" stroke-width="1.5"/>
  <text x="480" y="158" text-anchor="middle" font-size="13" font-weight="700" fill="#ffffff">ara::com — one application communication API</text>
  <line x1="480" y1="170" x2="480" y2="180" stroke="#444" stroke-width="2" marker-end="url(#arr)"/>

  <!-- ===================== Layer 3: binding layer ===================== -->
  <rect x="180" y="182" width="600" height="46" rx="8" fill="#ECECEC" stroke="#B0B0B0" stroke-width="1.5"/>
  <text x="480" y="201" text-anchor="middle" font-size="12.5" font-weight="700" fill="#333">Language binding (C++) + Communication binding</text>
  <text x="480" y="218" text-anchor="middle" font-size="9.5" fill="#333">compiled into the app binary · integrator picks the wire binding in the deployment manifest</text>

  <!-- ===================== Grouping labels ===================== -->
  <rect x="180" y="238" width="446" height="18" rx="4" fill="#DFF0D8" stroke="#8FBF8F" stroke-width="1.2"/>
  <text x="403" y="251" text-anchor="middle" font-size="9.5" font-weight="700" fill="#2d5a2d">the three standardized ara::com bindings</text>
  <rect x="642" y="238" width="138" height="18" rx="4" fill="#ECECEC" stroke="#B0B0B0" stroke-width="1.2"/>
  <text x="711" y="251" text-anchor="middle" font-size="9.5" font-weight="700" fill="#555">implementation-level</text>

  <!-- Arrows binding -> columns -->
  <line x1="249" y1="228" x2="249" y2="264" stroke="#444" stroke-width="1.6" marker-end="url(#arr)"/>
  <line x1="403" y1="228" x2="403" y2="264" stroke="#444" stroke-width="1.6" marker-end="url(#arr)"/>
  <line x1="557" y1="228" x2="557" y2="264" stroke="#444" stroke-width="1.6" marker-end="url(#arr)"/>
  <line x1="711" y1="228" x2="711" y2="264" stroke="#444" stroke-width="1.6" stroke-dasharray="6,4" marker-end="url(#arr)"/>

  <!-- ===================== Column A: SOME/IP over TCP/IP over Ethernet ===================== -->
  <rect x="180" y="266" width="138" height="44" rx="6" fill="#DCE9F7" stroke="#7f9dc9" stroke-width="1.5"/>
  <text x="249" y="287" text-anchor="middle" font-size="12" font-weight="700" fill="#223344">SOME/IP</text>
  <text x="249" y="302" text-anchor="middle" font-size="8.5" fill="#223344">+ SOME/IP-SD discovery</text>
  <line x1="249" y1="310" x2="249" y2="320" stroke="#444" stroke-width="1.6" marker-end="url(#arr)"/>
  <rect x="180" y="322" width="138" height="34" rx="6" fill="#EAF1FB" stroke="#9BBCE0" stroke-width="1.5"/>
  <text x="249" y="343" text-anchor="middle" font-size="11.5" font-weight="700" fill="#223344">UDP/TCP · IP</text>
  <line x1="249" y1="356" x2="249" y2="366" stroke="#444" stroke-width="1.6" marker-end="url(#arr)"/>
  <rect x="180" y="368" width="138" height="34" rx="6" fill="#EAF1FB" stroke="#9BBCE0" stroke-width="1.5"/>
  <text x="249" y="389" text-anchor="middle" font-size="11.5" font-weight="700" fill="#223344">Ethernet</text>

  <!-- ===================== Column B: DDS ===================== -->
  <rect x="334" y="266" width="138" height="136" rx="6" fill="#DCE9F7" stroke="#7f9dc9" stroke-width="1.5"/>
  <text x="403" y="290" text-anchor="middle" font-size="12" font-weight="700" fill="#223344">DDS</text>
  <text x="403" y="312" text-anchor="middle" font-size="9" fill="#223344">data-centric —</text>
  <text x="403" y="325" text-anchor="middle" font-size="9" fill="#223344">Topic + type + QoS</text>
  <text x="403" y="345" text-anchor="middle" font-size="9" fill="#223344">QoS is manifest-driven</text>
  <text x="403" y="376" text-anchor="middle" font-size="8.5" font-style="italic" fill="#223344">present since R18-03</text>

  <!-- ===================== Column C: Signal-Based ===================== -->
  <rect x="488" y="266" width="138" height="136" rx="6" fill="#DCE9F7" stroke="#7f9dc9" stroke-width="1.5"/>
  <text x="557" y="290" text-anchor="middle" font-size="12" font-weight="700" fill="#223344">Signal-Based</text>
  <text x="557" y="316" text-anchor="middle" font-size="9" fill="#223344">signal-oriented</text>
  <text x="557" y="329" text-anchor="middle" font-size="9" fill="#223344">wire binding</text>
  <text x="557" y="360" text-anchor="middle" font-size="8.5" font-style="italic" fill="#223344">standardized binding</text>

  <!-- ===================== Column D: local IPC ===================== -->
  <rect x="642" y="266" width="138" height="136" rx="6" fill="#F4F4F4" stroke="#B0B0B0" stroke-width="1.5" stroke-dasharray="6,4"/>
  <text x="711" y="290" text-anchor="middle" font-size="12" font-weight="700" fill="#555">local IPC</text>
  <text x="711" y="312" text-anchor="middle" font-size="9" fill="#555">intra-machine only</text>
  <text x="711" y="330" text-anchor="middle" font-size="8.5" fill="#555">implementation-specific,</text>
  <text x="711" y="342" text-anchor="middle" font-size="8.5" fill="#555">not an inter-vendor</text>
  <text x="711" y="354" text-anchor="middle" font-size="8.5" fill="#555">protocol</text>
  <text x="711" y="378" text-anchor="middle" font-size="8.5" font-style="italic" fill="#555">e.g. Eclipse iceoryx (zero-copy)</text>

  <!-- ===================== Annotation callout (a): app code never changes ===================== -->
  <line x1="170" y1="150" x2="180" y2="153" stroke="#9B7FC0" stroke-width="1.4" stroke-dasharray="5,3"/>
  <rect x="14" y="118" width="156" height="72" rx="8" fill="#EFE7F7" stroke="#9B7FC0" stroke-width="1.5"/>
  <circle cx="36" cy="140" r="12" fill="#6E4A9E"/>
  <text x="36" y="145" text-anchor="middle" font-size="12" font-weight="700" fill="#ffffff">a</text>
  <text x="58" y="138" text-anchor="start" font-size="10.5" font-weight="700" fill="#4A2E6B">Your application</text>
  <text x="26" y="156" text-anchor="start" font-size="10.5" font-weight="700" fill="#4A2E6B">code never changes.</text>
  <text x="26" y="176" text-anchor="start" font-size="8.5" fill="#4A2E6B">The API is protocol-agnostic.</text>

  <!-- ===================== Annotation callout (b): transport swaps here ===================== -->
  <line x1="790" y1="205" x2="780" y2="205" stroke="#9B7FC0" stroke-width="1.4" stroke-dasharray="5,3"/>
  <rect x="790" y="170" width="156" height="80" rx="8" fill="#EFE7F7" stroke="#9B7FC0" stroke-width="1.5"/>
  <circle cx="812" cy="192" r="12" fill="#6E4A9E"/>
  <text x="812" y="197" text-anchor="middle" font-size="12" font-weight="700" fill="#ffffff">b</text>
  <text x="834" y="190" text-anchor="start" font-size="10.5" font-weight="700" fill="#4A2E6B">The transport swaps</text>
  <text x="802" y="208" text-anchor="start" font-size="10.5" font-weight="700" fill="#4A2E6B">here, per deployment</text>
  <text x="802" y="224" text-anchor="start" font-size="10.5" font-weight="700" fill="#4A2E6B">manifest.</text>
  <text x="802" y="242" text-anchor="start" font-size="8.5" fill="#4A2E6B">No recompile of the app logic.</text>

  <!-- ===================== Bottom takeaway ===================== -->
  <rect x="180" y="430" width="600" height="40" rx="8" fill="#FCE8D5" stroke="#E0A96D" stroke-width="1.5"/>
  <text x="480" y="448" text-anchor="middle" font-size="11" font-weight="700" fill="#6B4A2B">The application API is protocol-agnostic; the binding is swappable underneath —</text>
  <text x="480" y="463" text-anchor="middle" font-size="11" font-weight="700" fill="#6B4A2B">exactly like ROS 2's rmw / DDS layering.</text>

  <!-- ===================== Footnote / gloss ===================== -->
  <text x="480" y="562" text-anchor="middle" font-size="9.5" fill="#555555">ara::com = the Adaptive communication-management API · proxy = client-side stub · skeleton = server-side stub · SOME/IP = Scalable service-Oriented MiddlewarE over IP</text>
  <text x="480" y="576" text-anchor="middle" font-size="9.5" fill="#555555">SD = Service Discovery · DDS = Data Distribution Service · QoS = Quality of Service · IPC = Inter-Process Communication · manifest = the deployment config that fixes the binding</text>
  <text x="480" y="596" text-anchor="middle" font-size="9" font-style="italic" fill="#777">Redrawn and annotated after AUTOSAR AP_SWS_CommunicationManagement, R25-11, Fig. 7.1 — original unmodified figure in the full deck and autosar/specs/.</text>
</svg>
