<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 804" width="960" height="804" font-family="Helvetica, Arial, sans-serif">
  <rect x="0" y="0" width="960" height="804" fill="#ffffff"/>
  <defs>
    <marker id="arr" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L9,3 L0,6 z" fill="#444"/>
    </marker>
  </defs>
  <text x="480" y="40" text-anchor="middle" font-size="25" font-weight="700" fill="#1b2b4a">Which stack? Two questions, six outcomes</text>
  <path d="M130,341.2 L191.0,221.4 L252,221.4" fill="none" stroke="#444" stroke-width="1.6" marker-end="url(#arr)"/>
  <path d="M130,357.2 L191.0,477.0 L252,477.0" fill="none" stroke="#444" stroke-width="1.6" marker-end="url(#arr)"/>
  <path d="M432,209.7 L544,101.5 L586,101.5" fill="none" stroke="#444" stroke-width="1.6" marker-end="url(#arr)"/>
  <path d="M432,221.4 L548,221.4" fill="none" stroke="#444" stroke-width="1.6"/>
  <path d="M548,221.4 L576,177.2 L586,177.2" fill="none" stroke="#444" stroke-width="1.6" marker-end="url(#arr)"/>
  <path d="M548,221.4 L576,259.2 L586,259.2" fill="none" stroke="#444" stroke-width="1.6" marker-end="url(#arr)"/>
  <path d="M432,233.1 L544,341.2 L586,341.2" fill="none" stroke="#444" stroke-width="1.6" marker-end="url(#arr)"/>
  <path d="M432,465.5 L544,436.0 L586,436.0" fill="none" stroke="#444" stroke-width="1.6" marker-end="url(#arr)"/>
  <path d="M432,488.5 L544,518.0 L586,518.0" fill="none" stroke="#444" stroke-width="1.6" marker-end="url(#arr)"/>
  <circle cx="548" cy="221.4" r="3.2" fill="#444"/>
  <rect x="10.0" y="326.7" width="120.0" height="45.0" rx="8" fill="#EFE7F7" stroke="#9B7FC0" stroke-width="1.5"/>
  <text x="70.0" y="349.2" text-anchor="middle" font-size="10.5" font-weight="700" fill="#4A2E6B">Q1: Where does this</text>
  <text x="70.0" y="362.7" text-anchor="middle" font-size="10.5" font-weight="700" fill="#4A2E6B">function run?</text>
  <rect x="252.0" y="192.1" width="180.0" height="58.5" rx="8" fill="#EFE7F7" stroke="#9B7FC0" stroke-width="1.5"/>
  <text x="342.0" y="214.6" text-anchor="middle" font-size="10.5" font-weight="700" fill="#4A2E6B">Q2: What safety level (ASIL)</text>
  <text x="342.0" y="228.1" text-anchor="middle" font-size="10.5" font-weight="700" fill="#4A2E6B">must this ECU carry, and who is</text>
  <text x="342.0" y="241.6" text-anchor="middle" font-size="10.5" font-weight="700" fill="#4A2E6B">the customer?</text>
  <rect x="252.0" y="441.0" width="180.0" height="72.0" rx="8" fill="#EFE7F7" stroke="#9B7FC0" stroke-width="1.5"/>
  <text x="342.0" y="463.5" text-anchor="middle" font-size="10.5" font-weight="700" fill="#4A2E6B">Q2: Do you need standardized</text>
  <text x="342.0" y="477.0" text-anchor="middle" font-size="10.5" font-weight="700" fill="#4A2E6B">service endpoints and supplier</text>
  <text x="342.0" y="490.5" text-anchor="middle" font-size="10.5" font-weight="700" fill="#4A2E6B">interop (ara::com, DM/SOVD,</text>
  <text x="342.0" y="504.0" text-anchor="middle" font-size="10.5" font-weight="700" fill="#4A2E6B">UCM)?</text>
  <rect x="586.0" y="66.0" width="358.0" height="71.0" rx="8" fill="#DCE9F7" stroke="#7f9dc9" stroke-width="1.5"/>
  <text x="598.0" y="84.0" text-anchor="start" font-size="12" font-weight="700" fill="#223344">Buy Classic (CP), pre-certified</text>
  <text x="598.0" y="102.0" text-anchor="start" font-size="8.5" fill="#223344">In practice this path is forced: OEM RFQs demand AUTOSAR plus ASIL evidence.</text>
  <text x="598.0" y="114.5" text-anchor="start" font-size="8.5" fill="#223344">The pre-certified base: Vector MICROSAR Safe, exida ASIL D since 2016.</text>
  <text x="598.0" y="127.0" text-anchor="start" font-size="8.5" fill="#223344"><tspan font-weight="700">SW:</tspan> static ARXML config, C, fixed-priority task model.</text>
  <rect x="586.0" y="148.0" width="358.0" height="58.5" rx="8" fill="#DCE9F7" stroke="#7f9dc9" stroke-width="1.5"/>
  <text x="598.0" y="166.0" text-anchor="start" font-size="12" font-weight="700" fill="#223344">Buy Classic (CP) anyway</text>
  <text x="598.0" y="184.0" text-anchor="start" font-size="8.5" fill="#223344">Nothing forces it, but it is the low-risk default.</text>
  <text x="598.0" y="196.5" text-anchor="start" font-size="8.5" fill="#223344">You get a certified base, vendor MCAL drivers, and solved UDS / COM / NvM modules.</text>
  <rect x="586.0" y="217.5" width="358.0" height="83.5" rx="8" fill="#DCE9F7" stroke="#7f9dc9" stroke-width="1.5"/>
  <text x="598.0" y="235.5" text-anchor="start" font-size="12" font-weight="700" fill="#223344">Certified non-AUTOSAR RTOS, your own safety case</text>
  <text x="598.0" y="253.5" text-anchor="start" font-size="8.5" fill="#223344">A certified RTOS exists outside AUTOSAR: SAFERTOS, TÜV SÜD, ISO 26262 ASIL D.</text>
  <text x="598.0" y="266.0" text-anchor="start" font-size="8.5" fill="#223344">You carry the whole ISO 26262 safety case. Rivian ships this way: in-house layers on</text>
  <text x="598.0" y="278.5" text-anchor="start" font-size="8.5" fill="#223344">FreeRTOS.</text>
  <text x="598.0" y="291.0" text-anchor="start" font-size="8.5" fill="#223344">UDS, COM and NvM are not included. Build or buy them separately.</text>
  <rect x="586.0" y="312.0" width="358.0" height="58.5" rx="8" fill="#DCE9F7" stroke="#7f9dc9" stroke-width="1.5"/>
  <text x="598.0" y="330.0" text-anchor="start" font-size="12" font-weight="700" fill="#223344">QM: free choice</text>
  <text x="598.0" y="348.0" text-anchor="start" font-size="8.5" fill="#223344">No certificate is needed here.</text>
  <text x="598.0" y="360.5" text-anchor="start" font-size="8.5" fill="#223344">Bare-metal, any RTOS, or CP if its ready-made modules save time.</text>
  <rect x="586.0" y="400.5" width="358.0" height="71.0" rx="8" fill="#DCE9F7" stroke="#7f9dc9" stroke-width="1.5"/>
  <text x="598.0" y="418.5" text-anchor="start" font-size="12" font-weight="700" fill="#223344">Buy an AP stack</text>
  <text x="598.0" y="436.5" text-anchor="start" font-size="8.5" fill="#223344"><tspan font-weight="700">HW:</tspan> an MMU multi-process SoC, required by [SWS_OSI_01010].</text>
  <text x="598.0" y="449.0" text-anchor="start" font-size="8.5" fill="#223344"><tspan font-weight="700">SW:</tspan> a POSIX OS (QNX or Linux) plus PSE51 and the C++ STL, per [RS_OSI_00100].</text>
  <text x="598.0" y="461.5" text-anchor="start" font-size="8.5" fill="#223344">Still yours: the OS, the hypervisor and the ASIL-D safety case.</text>
  <rect x="586.0" y="482.5" width="358.0" height="71.0" rx="8" fill="#DCE9F7" stroke="#7f9dc9" stroke-width="1.5"/>
  <text x="598.0" y="500.5" text-anchor="start" font-size="12" font-weight="700" fill="#223344">S-CORE or build your own</text>
  <text x="598.0" y="518.5" text-anchor="start" font-size="8.5" fill="#223344"><tspan font-weight="700">SW:</tspan> Linux or QNX plus open or in-house middleware (Tesla, Rivian).</text>
  <text x="598.0" y="531.0" text-anchor="start" font-size="8.5" fill="#223344">S-CORE is an open core stack, not an AP implementation. You integrate and certify.</text>
  <text x="598.0" y="543.5" text-anchor="start" font-size="8.5" fill="#223344">You re-implement every wire contract and own ISO 26262.</text>
  <text x="191.0" y="196.4" text-anchor="middle" font-size="10" font-weight="700" fill="#333">deeply-embedded MCU</text>
  <text x="191.0" y="208.4" text-anchor="middle" font-size="8.5" fill="#555555">no MMU, task-model RTOS:</text>
  <text x="191.0" y="219.4" text-anchor="middle" font-size="8.5" fill="#555555">AURIX / S32K / S32Z / RH850</text>
  <text x="191.0" y="452.0" text-anchor="middle" font-size="10" font-weight="700" fill="#333">HPC SoC</text>
  <text x="191.0" y="464.0" text-anchor="middle" font-size="8.5" fill="#555555">MMU, A-class cores:</text>
  <text x="191.0" y="475.0" text-anchor="middle" font-size="8.5" fill="#555555">Orin / Thor / S32G / R-Car</text>
  <text x="509.0" y="95.5" text-anchor="middle" font-size="9" font-weight="700" fill="#4A2E6B">ASIL A-D, sold to an OEM</text>
  <text x="509.0" y="215.4" text-anchor="middle" font-size="9" font-weight="700" fill="#4A2E6B">ASIL A-D, your own product</text>
  <text x="509.0" y="230.4" text-anchor="middle" font-size="8.5" fill="#4A2E6B">both are valid;</text>
  <text x="509.0" y="241.4" text-anchor="middle" font-size="8.5" fill="#4A2E6B">choose by team</text>
  <text x="509.0" y="335.2" text-anchor="middle" font-size="9" font-weight="700" fill="#4A2E6B">QM, no safety rating</text>
  <text x="509.0" y="430.0" text-anchor="middle" font-size="9" font-weight="700" fill="#4A2E6B">yes</text>
  <text x="509.0" y="512.0" text-anchor="middle" font-size="9" font-weight="700" fill="#4A2E6B">no</text>
  <path d="M185.0,481.0 L106,573.5" fill="none" stroke="#9B7FC0" stroke-width="1.4" stroke-dasharray="5,3"/>
  <rect x="16.0" y="573.5" width="322.0" height="55.5" rx="8" fill="#EFE7F7" stroke="#9B7FC0" stroke-width="1.5"/>
  <text x="26.0" y="594.5" text-anchor="start" font-size="9" font-weight="700" fill="#4A2E6B">The HPC's ASIL story lives outside the middleware: in the certified OS</text>
  <text x="26.0" y="607.0" text-anchor="start" font-size="9" fill="#4A2E6B">(QNX), the hypervisor, the safety island and the companion MCU. That</text>
  <text x="26.0" y="619.5" text-anchor="start" font-size="9" fill="#4A2E6B">companion MCU runs CP.</text>
  <rect x="12.0" y="649.0" width="936.0" height="46.0" rx="8" fill="#FCE8D5" stroke="#E0A96D" stroke-width="1.5"/>
  <text x="480.0" y="670.0" text-anchor="middle" font-size="11" font-weight="700" fill="#6B4A2B">Every outcome meets the same fleet contracts: UDS/DoIP (de-facto; CARB mandates OBDonUDS from MY2027), UN R155/R156, eCall, SOVD. Telemetry is always an</text>
  <text x="480.0" y="685.0" text-anchor="middle" font-size="11" font-weight="700" fill="#6B4A2B">OEM/cloud choice.</text>
  <text x="480.0" y="711.0" text-anchor="middle" font-size="8.5" fill="#555555">ASIL = Automotive Safety Integrity Level (ISO 26262; QM &lt; A &lt; B &lt; C &lt; D) · QM = Quality Managed, no safety rating · RFQ = request for quotation · OEM = the vehicle maker · MCU = microcontroller · HPC = High-Performance Computer · SoC =</text>
  <text x="480.0" y="722.5" text-anchor="middle" font-size="8.5" fill="#555555">System-on-Chip</text>
  <text x="480.0" y="734.0" text-anchor="middle" font-size="8.5" fill="#555555">CP = Classic Platform · AP = Adaptive Platform · ARXML = AUTOSAR XML configuration format · MCAL = Microcontroller Abstraction Layer (vendor-supplied drivers) · UDS / COM /</text>
  <text x="480.0" y="745.5" text-anchor="middle" font-size="8.5" fill="#555555">NvM = the diagnostics, signal and storage module families · MMU = Memory Management Unit</text>
  <text x="480.0" y="757.0" text-anchor="middle" font-size="8.5" fill="#555555">PSE51 = IEEE 1003.13 minimal POSIX profile · STL = C++ Standard Library · ara::com / DM / UCM = AP communication / diagnostics / update clusters · SOVD = Service-Oriented Vehicle Diagnostics (ISO 17978) · S-CORE = Eclipse Safe Open</text>
  <text x="480.0" y="768.5" text-anchor="middle" font-size="8.5" fill="#555555">Vehicle Core · exida / TÜV SÜD = safety certification bodies</text>
  <text x="480.0" y="780.0" text-anchor="middle" font-size="8.5" fill="#555555">UDS = Unified Diagnostic Services (ISO 14229) · DoIP = Diagnostics over IP (ISO 13400) · OBDonUDS = SAE J1979-2, the US emissions standard rebuilt on UDS · MY = model year · R155/R156 = UN cyber-security / software-update</text>
  <text x="480.0" y="791.5" text-anchor="middle" font-size="8.5" fill="#555555">management-system regulations</text>
</svg>
