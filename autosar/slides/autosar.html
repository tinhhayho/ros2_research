<h2 id="agenda">Agenda</h2>
<ol>
<li><strong>One org, three standards</strong> — history, governance, the FO / CP / AP split, the release timeline</li>
<li><strong>Classic Platform</strong> — the statically-configured RTOS stack you half-know: RTE/VFB, AUTOSAR OS, ARXML, the signal path, E2E/SecOC, DCM/DEM, NvM/WdgM, functional safety</li>
<li><strong>Adaptive Platform</strong> — the POSIX/C++ service platform on the &quot;big chip&quot;: function clusters, EM/SM, <code>ara::com</code>, SOME/IP vs DDS, UCM OTA, DM/SOVD, PHM, vendors &amp; ASIL reality, the open-source AP landscape</li>
<li><strong>Head-to-head &amp; coexistence</strong> — one vehicle running both, the R25-11 convergence, where ROS 2 sits, what it means for our team</li>
</ol>
<div class="gloss">AUTOSAR = AUTomotive Open System ARchitecture · FO = Foundation · CP = Classic Platform · AP = Adaptive Platform · RTE = Runtime Environment · VFB = Virtual Functional Bus · UDS = Unified Diagnostic Services (ISO 14229) · SOVD = Service-Oriented Vehicle Diagnostics · full expansions on the glossary slide near the end</div>
</section>

<h2 id="one-standard-set-three-members-fo--cp--ap">One standard set, three members: FO · CP · AP</h2>
<ul>
<li><strong>The org, in one line</strong>: a <strong>worldwide development partnership</strong> (founding talks 2002,<br />
Development Agreement July 2003), governed top-down by ~10 <strong>Core Partners</strong>; <strong>~360<br />
partners today, Asia-led</strong> (Jan 2025: Asia 174 &gt; Europe 140 &gt; NA 41). Jan 2026: DENSO, Huawei and<br />
Vector promoted to Core. Specs are <strong>free to read, license-to-build</strong></li>
<li><strong>Foundation (FO)</strong> — the cross-platform glue: common requirements, the <strong>meta-model and<br />
single XML schema</strong>, methodology, and shared wire protocols (SOME/IP, time-sync, DoIP, E2E,<br />
SecOC). FO is what lets a Classic ECU and an Adaptive machine live in one vehicle project</li>
<li><strong>Classic Platform (CP)</strong> — statically-configured, real-time, <strong>OSEK-heritage</strong> stack for<br />
deeply embedded microcontrollers. First released 1.0 in <strong>2005</strong></li>
<li><strong>Adaptive Platform (AP)</strong> — <strong>POSIX</strong>-based, service-oriented, dynamically-deployed stack<br />
for high-performance compute. First released <strong>17-03 (March 2017)</strong></li>
<li><strong>The naming trap</strong>: the <strong>R19-11 unification</strong> (Nov 2019) merged CP's <code>4.x.y</code> and AP's<br />
<code>yy-mm</code> into one annual <code>R{yy}-11</code> label, one November release, one schema — <strong>but the CP<br />
internal version never reset</strong>. R25-11 is internally <strong>R4.11.0</strong>; &quot;AUTOSAR 4.x&quot; is alive</li>
<li><strong>Document prefixes</strong> you'll meet: <strong>EXP</strong> (explanatory), <strong>TR</strong> (technical report),<br />
<strong>RS/SRS</strong> (requirements), <strong>SWS</strong> (the detailed testable module spec), <strong>TPS</strong> (templates),<br />
<strong>PRS</strong> (wire-protocol requirements)</li>
</ul>
<div class="gloss">OSEK = the 1990s European automotive RTOS standard CP's OS descends from · POSIX = Portable Operating System Interface (IEEE 1003) · SOME/IP = Scalable service-Oriented MiddlewarE over IP · DoIP = Diagnostics over IP (ISO 13400) · E2E = End-to-End protection · SecOC = Secure Onboard Communication · SWS = Software Specification</div>
</section>

<h2 id="what-classic-is-and-where-it-runs">What Classic is, and where it runs</h2>
<ul>
<li><strong>A statically-configured software stack for deeply embedded ECUs</strong> — single<br />
microcontrollers, no MMU-class OS, hard real-time, safety-critical. The OSEK-heritage half</li>
<li><strong>Hold onto this one property</strong>: a CP ECU builds to <strong>one statically configured binary</strong> —<br />
fixed task set, fixed communication matrix, fixed memory map, all decided at design time.<br />
<em>&quot;All tasks that will ever execute … are allocated when the executable image is built.&quot;</em><br />
No <code>malloc</code>, no runtime task creation, no service negotiation</li>
<li>This is the discipline safety-critical firmware already follows by hand — <strong>CP formalizes it<br />
and generates the glue</strong></li>
<li><strong>Where it sits in a 2026 vehicle</strong>: CP owns the <strong>edge</strong> — zonal, body/chassis/powertrain<br />
ECUs, and the <strong>safety MCU</strong> that gates actuators on high-compute boards. On an NVIDIA DRIVE<br />
board: the big SoC does perception; a small lock-step safety MCU running CP owns the<br />
fail-safe path and diagnostics</li>
<li><strong>Pinned silicon</strong>: Orin-gen safety MCU = <strong>Infineon AURIX TC397X</strong>; Thor-gen companion MCU<br />
= <strong>Renesas RH850U2A16</strong> (Vector MICROSAR Classic as reference). <em>Never say Thor uses AURIX</em></li>
<li>Myth this repo already killed: <strong>&quot;Classic = CAN only&quot; is false</strong> — CP has had a standardized<br />
SOME/IP Transformer since <strong>4.2.1 (Oct 2014)</strong>, years before AP's first release, plus Ethernet,<br />
DoIP, LIN, FlexRay</li>
</ul>
<div class="gloss">ECU = Electronic Control Unit · MMU = Memory Management Unit (virtual memory; CP has none) · MCU = microcontroller · SoC = System-on-Chip · lock-step = two cores running identical code compared each cycle for fault detection · MICROSAR = Vector's AUTOSAR product family</div>
</section>

<h2 id="the-three-layers-and-the-one-escape-hatch">The three layers, and the one escape hatch</h2>
<ul>
<li>CP has three top-level layers: <strong>Application → Runtime Environment (RTE) → Basic Software<br />
(BSW)</strong>. The BSW splits into three horizontal layers plus one vertical bypass:</li>
</ul>
<table>
<thead>
<tr>
<th>BSW sub-layer</th>
<th>What it does</th>
<th>Firmware analogy</th>
</tr>
</thead>
<tbody>
<tr>
<td><strong>Services</strong> (top)</td>
<td>OS, comms + network mgmt, NVRAM, diagnostics, ECU-state mgmt</td>
<td>your middleware: UDS server, EEPROM mgr, watchdog kicker</td>
</tr>
<tr>
<td><strong>ECU Abstraction</strong></td>
<td>abstracts <em>board</em> wiring — which peripheral a signal routes through</td>
<td>your board-support glue</td>
</tr>
<tr>
<td><strong>MCAL</strong> (bottom)</td>
<td>register-level access to on-chip peripherals; MCU-specific, silicon-vendor-supplied</td>
<td><strong>the vendor HAL, made standard</strong> — you <em>port</em> it, not rewrite</td>
</tr>
<tr>
<td><strong>CDD</strong> (vertical)</td>
<td>sanctioned escape hatch: may touch hardware directly for non-standard / extreme-timing needs</td>
<td>a bare-metal ISR that bypasses your own abstraction</td>
</tr>
</tbody>
</table>
<ul>
<li>Drivers you know by register — Dio, Port, Adc, Pwm, Spi, Can, Wdg, Mcu — live in <strong>MCAL</strong><br />
behind a fixed API and generated config</li>
</ul>
<div class="gloss">RTE = Runtime Environment · BSW = Basic Software · MCAL = Microcontroller Abstraction Layer · NVRAM = non-volatile RAM · CDD = Complex Device Driver · HAL = hardware abstraction layer · ISR = interrupt service routine · the CDD legitimately breaks the layering — the standard sanctions it</div>
</section>

<h2 id="the-relocation-trick--swcs-the-vfb-and-why-the-rte-is-generated">The relocation trick — SWCs, the VFB, and why the RTE is generated</h2>
<ul>
<li>Application logic is packaged as <strong>Software Components (SWCs)</strong> exposing <strong>ports</strong> typed by<br />
interfaces — mainly <strong>sender-receiver</strong> (data-flow) and <strong>client-server</strong> (operation). Code<br />
is organized as <strong>runnable entities</strong>, each ultimately <em>&quot;a C function&quot;</em> fired by RTE Events</li>
<li><strong>SWCs never call each other directly.</strong> They talk over the <strong>Virtual Functional Bus (VFB)</strong><br />
— a <em>logical</em> concept spanning ECUs. The thing that actually implements the VFB on a real<br />
ECU is the <strong>RTE</strong>, generated per deployment</li>
<li>RTE generation has two phases: <strong>contract phase</strong> (emits <code>Rte_&lt;SWC&gt;.h</code> so a SWC compiles in<br />
isolation) and <strong>generation phase</strong> (emits the real code that moves data / dispatches runnables)</li>
<li>SWC code calls <strong><code>Rte_Write()</code> / <code>Rte_Read()</code> / <code>Rte_Call()</code></strong> — and <em>never knows</em> whether the<br />
peer is a runnable on the <strong>same</strong> ECU (a local buffer copy) or a <strong>remote</strong> one (a COM<br />
message over CAN/Ethernet)</li>
<li><strong>This is why the same SWC relocates to a different ECU without code changes</strong> — it<br />
references only ports and <code>Rte_*</code> symbols, never a bus or a driver. Moving it changes only<br />
what the RTE generator emits. <strong>There is no real bare-metal analogue to this</strong></li>
</ul>
<div class="gloss">SWC = Software Component · VFB = Virtual Functional Bus · runnable = the schedulable C-function unit inside a SWC · COM = the AUTOSAR signal-packing communication module · deployment (which SWC runs on which ECU) is a late-binding config decision realized by regenerating the RTE</div>
</section>

<h2 id="autosar-os--osek-heritage-plus-scalability-classes">AUTOSAR OS — OSEK heritage, plus scalability classes</h2>
<ul>
<li>AUTOSAR OS is a <strong>backward-compatible superset of OSEK/VDX OS (ISO 17356-3)</strong> — <em>not</em> &quot;= OSEK&quot;.<br />
It keeps OSEK's core: static tasks, fixed-priority preemptive scheduling, priority-ceiling<br />
resources, events, alarms, counters, Cat-1 vs Cat-2 ISRs. <strong>Know OSEK → you know ~70% of it</strong></li>
<li>What AUTOSAR bundled on top, as <strong>Scalability Classes</strong>:</li>
</ul>
<table>
<thead>
<tr>
<th>Class</th>
<th>=</th>
<th>Adds</th>
</tr>
</thead>
<tbody>
<tr>
<td><strong>SC1</strong></td>
<td>OSEK OS +</td>
<td><strong>Schedule Tables</strong> (time-triggered, sync to global time), stack monitoring</td>
</tr>
<tr>
<td><strong>SC2</strong></td>
<td>SC1 +</td>
<td><strong>Timing Protection</strong> (execution / inter-arrival budgets) + global time sync</td>
</tr>
<tr>
<td><strong>SC3</strong></td>
<td>SC1 +</td>
<td><strong>Memory Protection</strong> + OS-Applications + trusted/non-trusted functions</td>
</tr>
<tr>
<td><strong>SC4</strong></td>
<td>SC2+SC3</td>
<td>both timing and memory protection</td>
</tr>
</tbody>
</table>
<ul>
<li><strong>Multicore</strong> arrived in release <strong>4.0 (2009)</strong>: multi-core startup, <strong>spinlocks</strong>, and<br />
<strong>IOC</strong> (Inter-OS-Application Communication) — a spinlock-protected shared-memory ring for<br />
data crossing a core/partition boundary</li>
</ul>
<div class="gloss">OSEK/VDX = the 1990s automotive RTOS standard · ISR = interrupt service routine (Cat-1 = no OS calls, lowest latency; Cat-2 = may call OS services) · SC = Scalability Class · IOC = Inter-OS-Application Communication · exact SC1–SC4 wording is medium-confidence (structure high) — see references</div>
</section>

<h2 id="the-model-driven-workflow--arxml-and-the-oem%E2%86%94supplier-handshake">The model-driven workflow — ARXML and the OEM<img class="emoji" draggable="false" alt="↔" src="https://cdn.jsdelivr.net/gh/jdecked/twemoji@17.0.2/assets/svg/2194.svg" data-marp-twemoji=""/>supplier handshake</h2>
<ul>
<li>Everything is exchanged as <strong>ARXML</strong> (&quot;AUTOSAR XML&quot;), a fixed-schema format that is <strong>rarely<br />
hand-authored</strong> — GUI configuration tools produce and consume it. The classic flow:
<ol>
<li><strong>System / VFB Description</strong> (OEM) — all SWCs, ports, topology, signals → System Config</li>
<li><strong>ECU Extract</strong> — the slice for <em>one</em> ECU, handed to the Tier-1 supplier</li>
<li><strong>ECU Configuration (ECUC)</strong> — supplier configures that ECU's BSW + RTE</li>
<li><strong>Generation</strong> — tools emit BSW config, the RTE and OS config; compiles with hand-written<br />
SWC code + vendor MCAL into <strong>one ECU executable</strong></li>
</ol>
</li>
<li><strong>Dominant toolchains</strong>: <strong>Vector DaVinci</strong> (Developer + Configurator), <strong>EB tresos Studio</strong>,<br />
<strong>ETAS ISOLAR / RTA-CAR</strong>. MCU vendors ship the MCAL matching each toolchain</li>
<li><strong>Language rule</strong>: BSW/RTE code is <strong>C</strong> and must be <strong>MISRA C</strong> — 4.2 required C:2004; <strong>4.3<br />
and later (incl. R25-11) require MISRA C:2012</strong>. (C++14 is an <em>Adaptive</em> concern — easy to conflate)</li>
<li><strong>What is genuinely new</strong> for a bare-metal + RTOS engineer is not the OS or the HAL — it's the<br />
<strong>generate-then-compile workflow</strong> and the <strong>ARXML handshake</strong>, an artefact with no firmware-world equivalent</li>
</ul>
<div class="gloss">ARXML = AUTOSAR XML config format · ECUC = ECU Configuration Description · Tier-1 = the supplier who builds an ECU for the OEM · MISRA C = the automotive safe-C coding-rule set · MCAL = Microcontroller Abstraction Layer</div>
</section>

<h2 id="the-frozen-communication-matrix">The frozen communication matrix</h2>
<ul>
<li>CP communication is <strong>signal-oriented and frozen at build time</strong> — a layered pipeline of BSW<br />
modules, each doing one abstraction step (see the previous diagram)</li>
<li>The <strong>communication matrix (K-matrix)</strong> is the master description of <em>all</em> network<br />
communication in the vehicle: every frame/PDU, every signal, sender ECU, receivers, byte<br />
layout, timing, value encoding. It is frozen because CP targets small-flash, deterministic,<br />
ASIL ECUs — so COM's packing, PduR's routing and CanIf's handle map are all <strong>statically<br />
generated</strong> and provable at integration time</li>
<li><strong>File-format lineage</strong>: <strong>DBC</strong> (Vector, CAN), <strong>LDF</strong> (LIN), <strong>FIBEX</strong> (ASAM, multi-bus),<br />
and AUTOSAR's own <strong>ARXML</strong> carrier. It is the CAN message database (DBC) you know — promoted<br />
to a whole-vehicle, multi-bus, code-generating source of truth</li>
<li><strong>Bus landscape 2026</strong>: <strong>CAN FD</strong> mainstream (up to 64-byte payload); classic CAN survives<br />
for low-cost nodes; <strong>FlexRay in decline</strong> (still specified, not removed); <strong>Automotive<br />
Ethernet (100/1000BASE-T1, TSN)</strong> is the growth path, carrying SOME/IP and DoIP</li>
<li><strong>CAN XL</strong> (ISO 11898-1:2024, up to 2048-byte payloads) is emerging — AUTOSAR support release<br />
unconfirmed (open question)</li>
</ul>
<div class="gloss">PDU = Protocol Data Unit (the byte array a signal is packed into) · PduR = PDU Router · CanIf = CAN Interface · ASIL = Automotive Safety Integrity Level (ISO 26262, QM &lt; A &lt; B &lt; C &lt; D) · TSN = Time-Sensitive Networking (IEEE 802.1) · CAN FD = CAN with Flexible Data-rate</div>
</section>

<h2 id="e2e-and-secoc--protect-the-data-not-the-channel">E2E and SecOC — protect the data, not the channel</h2>
<ul>
<li><strong>E2E (End-to-End) protection</strong> guards safety-relevant data per ISO 26262. It's a<br />
transformer in the COM chain, so protection travels <strong>with the payload across ECU and bus<br />
boundaries — including through PduR gateways</strong>: CRC + counter computed at the true sender,<br />
checked at the true receiver, so a gateway can't silently corrupt safety data</li>
<li>Fault model: repetition, loss, delay, insertion, masquerade, wrong sequence, corruption…<br />
Mechanisms: a <strong>CRC</strong>, a <strong>counter</strong>, <strong>timeout monitoring</strong>, and a <strong>Data ID</strong> folded in.<br />
Profiles range <strong>P1/P2/P11/P22 (8-bit)</strong> · <strong>P5/P6 (16-bit)</strong> · <strong>P4 (32-bit)</strong> · <strong>P7 (64-bit)</strong><br />
— 8-bit profiles <em>cannot</em> detect a masquerade fault in a single cycle</li>
<li><strong>SecOC (Secure Onboard Communication)</strong> adds <strong>authenticity + freshness</strong> — <strong>it does NOT<br />
encrypt.</strong> The payload stays in the clear. TX builds a <strong>Secured I-PDU</strong> = data +<br />
<strong>Authenticator (a MAC)</strong> + optional <strong>Freshness Value</strong>, using <strong>CMAC / AES-128</strong> (NIST<br />
SP 800-38B); the MAC is <strong>truncated</strong> to fit tight CAN payloads (a bandwidth/security tradeoff)</li>
<li><strong>Honest guarantee</strong>: a verified MAC proves the message came from a holder of the shared<br />
symmetric key and is fresh (defeats replay) — it does <strong>not</strong> hide data and gives <strong>no<br />
non-repudiation</strong>. Keys come from the Crypto stack, out of SecOC's scope</li>
</ul>
<div class="gloss">E2E = End-to-End · CRC = Cyclic Redundancy Check · Data ID = a per-signal identifier mixed into the CRC · SecOC = Secure Onboard Communication · MAC = Message Authentication Code · CMAC = Cipher-based MAC · "no confidentiality" is inferred from the PRS scope — medium confidence</div>
</section>

<h2 id="diagnostics--dem-computes-dcm-formats-get-this-split-right">Diagnostics — DEM computes, DCM formats (get this split right)</h2>
<ul>
<li><strong>The #1 conceptual error to avoid</strong>: <strong>DEM is the fault database; DCM is the protocol<br />
server that reads it and talks to the tester.</strong> DCM computes nothing about faults</li>
<li><strong>DEM (Diagnostic Event Manager)</strong> is the fault memory. SWCs report a monitor result<br />
(Passed/Failed) via <code>Dem_SetEventStatus</code>; DEM <strong>debounces</strong> it (counter / time / monitor-<br />
internal), decides when a fault is mature, maintains the per-DTC <strong>8-bit UDS status byte</strong><br />
(bit 0 <code>testFailed</code> … bit 3 <code>confirmedDTC</code> … bit 7 <code>warningIndicatorRequested</code>), and stores<br />
freeze frames to NvM — it is a <em>client</em> of the memory stack, it never touches flash itself</li>
<li><strong>DCM (Diagnostic Communication Manager)</strong> is a generated, dumb-but-strict <strong>UDS server</strong>. On<br />
<code>0x19 ReadDTCInformation</code> it calls into DEM and formats the answer. It also runs <strong>OBD<br />
$01–$0A</strong> (J1979) side by side</li>
<li><strong>FiM (Function Inhibition Manager)</strong> is the third leg: DEM informs FiM on status change, and<br />
FiM <strong>inhibits monitors</strong> that would give false readings — prevents cascade/false DTCs</li>
<li><strong>OBD vs UDS</strong>: <strong>UDS (ISO 14229) is contractual</strong>; <strong>OBD $01–$0A is statutory — and only for<br />
emissions ECUs</strong>. A body/comfort ECU has no OBD duty; it serves only UDS</li>
</ul>
<div class="gloss">DEM = Diagnostic Event Manager · DCM = Diagnostic Communication Manager · FiM = Function Inhibition Manager · DTC = Diagnostic Trouble Code · DID = Data Identifier · NvM = the non-volatile-memory manager · OBD = On-Board Diagnostics · J1979 = SAE emissions-diagnostic standard · a DID read (0x22) checks the DID exists + session + security, then binds to an RTE port or read callout</div>
</section>

<h2 id="functional-safety--ffi-and-what-timing-protection-is-not">Functional safety — FFI, and what timing protection is NOT</h2>
<ul>
<li>CP's safety story is <strong>freedom from interference (FFI)</strong> on three axes — memory, timing,<br />
execution — plus E2E for the communication path (AUTOSAR <em>Functional Safety Measures</em>, Doc 664)</li>
<li><strong>Memory FFI = Memory Partitioning via OS-Applications</strong>, MPU-enforced: untrusted partitions<br />
run non-privileged, MPU regions reprogrammed on context switch, any out-of-region access<br />
traps to hardware. <strong>Trusted</strong> vs <strong>Non-Trusted</strong> OS-Applications. <em>Limit</em>: partitioning is at<br />
OS-Application granularity — <strong>it cannot separate two Runnables inside one SWC</strong></li>
<li><strong>The genuine surprise</strong> (easy to get wrong on a slide): <em>&quot;The AUTOSAR OS does <strong>not</strong> offer<br />
deadline supervision for timing protection.&quot;</em> Timing Protection enforces three <strong>budgets</strong> —<br />
<strong>Execution Time</strong>, <strong>Locking Time</strong>, <strong>Inter-Arrival Time</strong> — <strong>not</strong> deadlines.<br />
<strong>Deadline supervision is a separate WdgM job</strong> — the <strong>Watchdog Manager</strong> does <strong>Alive /<br />
Deadline / Logical</strong> supervision over checkpoints and services the HW watchdog <em>only while<br />
everything is correct</em> (far beyond a single <code>IWDG_Refresh()</code>)</li>
<li>Determinism comes from being <strong>statically everything</strong>: no heap, static schedule tables, no<br />
MMU dependence, timing protection as a runtime backstop</li>
<li><strong>Certified proof point</strong>: <strong>Vector MICROSAR Classic Safe</strong> — <em>&quot;the world's first AUTOSAR<br />
implementation … certified to ISO 26262 up to ASIL D&quot;</em> (2016), later exida re-cert covering<br />
multicore FFI and execution-time bounds. So one CP ECU can host mixed-criticality software:<br />
ASIL-D braking in one partition, QM comfort code in another</li>
</ul>
<div class="gloss">FFI = Freedom From Interference (ISO 26262 term) · MPU = Memory Protection Unit (region-compare, not virtual memory) · OS-Application = the partition unit that owns tasks/ISRs/resources · WdgM = Watchdog Manager · WCET = Worst-Case Execution Time · QM = Quality Managed (no ASIL) · execution-time enforcement requires MCU timer/MPU hardware</div>
</section>

<h2 id="why-classic-persists--structural-limits-by-design">Why Classic persists — structural limits, by design</h2>
<ul>
<li>CP's strengths invert into hard limits, and AUTOSAR's own R25-11 architecture-decisions doc<br />
(Doc 1078) frames the CP/AP split around them <strong>on purpose</strong>:
<ul>
<li><strong>Static communication matrix</strong> — no service discovery of new relationships; adding one<br />
means re-generate + re-flash. <em>&quot;If you want software that can be replaced during run time,<br />
this does not work&quot;</em></li>
<li><strong>No dynamic deployment / limited OTA of function</strong> — the ECU image is monolithic and static</li>
<li><strong>C-centric BSW, no dynamic memory</strong> — determinism <em>requires</em> no heap, which forbids the<br />
C++/STL ecosystem AUTOSAR itself calls <em>&quot;essentially indispensable&quot;</em> for Adaptive. CP cannot<br />
host large evolving perception/AI stacks</li>
<li><strong>Scaling pain on HPCs</strong> — built for single-digit-core MCUs with kB–MB memory</li>
</ul>
</li>
<li><strong>This is exactly why CP persists at the edge</strong>: its static determinism and ASIL-D cert are<br />
what a <strong>safety island</strong> needs, and its inflexibility doesn't matter there</li>
<li>The 2026 pattern is a <strong>designed hierarchy, not legacy baggage</strong> — the most advanced AV<br />
compute still delegates the certified fail-safe path to a small lock-step MCU running Vector<br />
<em>Classic</em> (Orin → AURIX TC397X; Thor → Renesas RH850U2A16). <em>Not</em> a hypervisor guest on Thor;<br />
<em>not</em> a documented Thor fleet gateway</li>
</ul>
<div class="gloss">OTA = Over-The-Air (software update) · STL = C++ Standard Template Library · HPC = High-Performance Computer/Computing · safety island = the small certified MCU that gates actuators for a powerful-but-less-certifiable SoC · AV = Autonomous Vehicle</div>
</section>

<h2 id="why-the-adaptive-platform-exists">Why the Adaptive Platform exists</h2>

<ul>
<li>CP cannot serve the new tier of automotive compute — <strong>high-performance computer (HPC)</strong> ECUs<br />
driving Ethernet backbones, many-core/GPU/FPGA silicon, service-oriented ADAS/connectivity,<br />
and <strong>OTA</strong>. AUTOSAR says so plainly: <em>&quot;the needs of ECUs described above cannot be fulfilled<br />
[by CP]. Therefore, AUTOSAR specifies a second software platform, the Adaptive Platform …<br />
offers flexible software configuration, e.g. to support software update over-the-air&quot;</em></li>
<li>Two named drivers: <strong>Ethernet</strong> (switched, high-bandwidth — CP <em>&quot;cannot fully utilise&quot;</em> it)<br />
and <strong>processors</strong> (<em>&quot;manycore … tens to hundreds of cores, GPGPU … FPGA&quot;</em>)</li>
<li><strong>The one-line orientation, say it precisely</strong>: <em>&quot;The Adaptive Platform does <strong>not</strong> specify a<br />
new Operating System … it defines an execution context and Operating System Interface.&quot;</em><br />
<strong>AP is middleware + services on top of a POSIX OS — not a new OS.</strong> If your CP instinct is<br />
&quot;AUTOSAR = the RTOS on my MCU,&quot; that instinct is wrong for AP</li>
<li><strong>Not &quot;CP is obsolete&quot;</strong> — the two coexist in every real vehicle, usually CP on a companion<br />
safety MCU and AP on the application SoC</li>
<li><strong>The four design traits</strong>: <strong>C++</strong>, <strong>SOA</strong> (a peer is addressed the same whether local<br />
process or remote machine), <strong>updateability/OTA</strong>, and <strong>agile</strong> deploy-then-update development</li>
<li><strong>The dynamic-memory culture shock</strong>: every MISRA-C engineer carries a &quot;no <code>malloc</code> in safety<br />
code&quot; reflex — AUTOSAR says the <em>opposite</em> for AP (dynamic allocation is <em>&quot;allowed and<br />
assumed&quot;</em>), answering the non-determinism cost not by banning the heap but with <strong>deterministic<br />
allocators</strong>. Still, &quot;dynamic&quot; means <strong>deploy-time flexibility + OTA</strong>, <em>not</em> free-running<br />
runtime allocation: the process set per state is fixed in manifests, only discovery is runtime</li>
</ul>
<div class="gloss">HPC = High-Performance Computer · ADAS = Advanced Driver-Assistance Systems · FPGA = Field-Programmable Gate Array · GPGPU = General-Purpose GPU computing · SOA = Service-Oriented Architecture · POSIX = the standard OS API family (Linux/QNX/PikeOS) AP builds on · deterministic allocator = a fixed-time, fragmentation-bounded replacement for `malloc`/`free`</div>
</section>

<h2 id="adaptive-applications-are-posix-processes-on-ara">Adaptive Applications are POSIX processes on ARA</h2>
<ul>
<li>An <strong>Adaptive Application (AA)</strong> is an ordinary <strong>POSIX process</strong> written in <strong>C++</strong>, linked<br />
against <strong>ARA</strong> (AUTOSAR Runtime for Adaptive Applications)</li>
<li>Crucially an AA is restricted &quot;by definition&quot; to the <strong>POSIX PSE51</strong> profile — a<br />
<em>single-process</em> profile (IEEE 1003.13). PSE51 gives threads, mutexes, RT scheduling, timers —<br />
but <strong>excludes <code>fork</code>/<code>exec</code></strong> (no multi-process, no <code>posix_spawn</code>) — POSIX shared-memory objects it keeps. Consequences: <strong>one process = one<br />
address space, multiple threads</strong>; you cannot spawn children (that's Execution Management's<br />
job); isolation comes from OS process boundaries. Note the OS <em>itself</em> must be <strong>multi-process<br />
POSIX</strong> — only the <em>AAs</em> are held to PSE51</li>
<li>The Machine may be <em>&quot;a real physical machine, a fully-virtualized machine, a para-virtualized<br />
OS, an OS-level container or any other virtualized&quot;</em> environment — AP presents a consistent view</li>
<li>AAs code against the <strong><code>ara::</code> C++ namespaces</strong> — <code>ara::com</code>, <code>ara::exec</code>, <code>ara::core</code>,<br />
<code>ara::log</code>, <code>ara::crypto</code>, <code>ara::diag</code>, <code>ara::per</code>, <code>ara::phm</code></li>
<li>The building-block view groups the function clusters into <strong>seven technical categories</strong> —<br />
Runtime, Communication, Storage, Security, Safety, Configuration, Diagnostics</li>
</ul>
<div class="gloss">AA = Adaptive Application · ARA = AUTOSAR Runtime for Adaptive Applications (the `ara::` C++ API surface) · PSE51 = IEEE 1003.13's minimal single-process real-time POSIX profile · `fork`/`exec` = the POSIX process-creation calls PSE51 omits</div>
</section>

<h2 id="execution-mgmt-vs-state-mgmt--em-enforces-sm-decides">Execution Mgmt vs State Mgmt — EM enforces, SM decides</h2>
<ul>
<li><strong>The single most-misunderstood pair.</strong> <strong>Execution Management (EM)</strong> <em>&quot;starts, configures,<br />
and stops Processes as configured in Function Group States using interfaces of the OS&quot;</em> — it's<br />
the entry point the OS launches at boot. <strong>But EM does not decide <em>which</em> apps run or <em>when</em></strong>:<br />
<em>&quot;a special FC, called State Management (SM), is the controller, commanding EM.&quot;</em> <strong>SM owns the<br />
policy; EM only enforces the mechanism</strong></li>
<li>The unit of composition is the <strong>Function Group</strong> — a named set of processes with states,<br />
where <em>&quot;a Function Group State defines a set of active Applications for any certain situation.&quot;</em><br />
Elegant unification: a <strong>&quot;Machine State&quot; is just the Function Group State of a reserved group<br />
<code>MachineFG</code></strong> in the one <code>PLATFORM_CORE</code> cluster</li>
<li><strong>&quot;EM ≈ systemd&quot; breaks in five ways</strong>: (a) policy is externalized to a safety cluster (SM),<br />
not unit files; (b) the unit is a whole machine mode, not a service target; (c) EM enforces<br />
<strong>resource groups</strong> + <strong>authenticated startup</strong>; (d) config is <strong>ARXML Manifests</strong>, not<br />
<code>.service</code> files; (e) EM is a <strong>certified entry point</strong> under an ISO 26262 argument</li>
<li><strong>Five manifest kinds</strong>: <strong>Execution</strong> (per-executable), <strong>Service Instance</strong> (service→transport<br />
mapping), <strong>Machine</strong> (the machine with no apps), <strong>Raw Data Stream</strong>, <strong>Software Distribution</strong></li>
</ul>
<div class="gloss">EM = Execution Management · SM = State Management · FC = Function Cluster · Function Group = a named set of processes with states · Manifest = ARXML authored at integration time, read at startup · systemd = the Linux service manager (the tempting-but-wrong analogy)</div>
</section>

<h2 id="aracom--one-api-several-bindings"><code>ara::com</code> — one API, several bindings</h2>
<ul>
<li>AP exposes <strong>one</strong> application communication API, <code>ara::com</code>, on a <strong>proxy/skeleton</strong> model:<br />
the <strong>proxy</strong> is the local representative of a possibly-remote service; the <strong>skeleton</strong><br />
connects the service implementation to the transport. <strong>The app codes against <code>ara::com</code>; the<br />
integrator chooses the wire binding in the manifest</strong></li>
<li>A subtlety: <strong>serialization runs in the AA's own execution context</strong> (the binding is compiled<br />
into the app binary, not a separate broker). The API supports event/callback <em>and</em> polling,<br />
sync + async methods (<code>std::future</code>/<code>std::promise</code>), and <strong>zero-copy</strong> capabilities</li>
<li><strong>Four service elements</strong>: an <strong>event</strong> (a notification carrying data, to subscribers only); a<br />
<strong>trigger</strong> (the same, <em>without</em> payload — a data-less &quot;something happened&quot;); a <strong>method</strong><br />
(client/server request/response, or fire-and-forget); a <strong>field</strong> (a value with up to three<br />
accessors — notifier, getter, setter)</li>
<li><strong>R25-11 currency</strong>: the big <code>ara::com</code> cuts actually landed at <strong>R23-11</strong> — <strong>Raw Data Streaming<br />
removed</strong> and <strong>Communication Groups marked OBSOLETE</strong> (Comm Groups ran R20-11 → R23-11; Raw Data<br />
Streaming had been in <code>ara::com</code> since R19-11). R25-11 itself just <strong>reworked the <code>ara::com</code> C++<br />
API</strong> against generated headers and deleted the leftover obsolete text. Listing those as current is stale</li>
</ul>
<div class="gloss">`ara::com` = the Adaptive communication-management API · proxy = client-side stub · skeleton = server-side stub · event / trigger / method / field = the four service-element kinds · zero-copy = passing data by pointer in shared memory, no serialization copy</div>
</section>

<h2 id="binding-choice-someip-vs-dds-vs-local-ipc">Binding choice: SOME/IP vs DDS vs local IPC</h2>
<ul>
<li><strong>SOME/IP</strong> — the automotive-native option: compact serialization + <strong>SOME/IP-SD</strong> service<br />
discovery. Connection- and ID-oriented (Service ID / Instance ID / Event ID / Eventgroup) —<br />
familiar from CAN/UDS thinking. Subscription granularity is the <strong>eventgroup</strong>; SD runs <strong>over<br />
UDP multicast only</strong></li>
<li><strong>DDS binding — present since R18-03</strong> (published 23 Apr 2018; <em>not</em> R18-10, a folklore<br />
correction this repo already made). <strong>Data-centric</strong>: publish to a Topic, matched by type +<br />
QoS + name, no explicit peer connection. Mapping: events/triggers → <strong>Topic + DataWriter</strong>;<br />
methods &amp; field get/set → <strong>DDS Service (DDS-RPC)</strong>; field notifiers → a Topic. <strong>QoS is<br />
manifest-driven</strong> (<code>qosProfile</code>), not fixed by the spec</li>
<li><strong>Local IPC / zero-copy</strong> — the local wire is <strong>implementation-specific</strong>, <em>not</em> a<br />
standardized inter-vendor protocol (unlike SOME/IP and RTPS). The dominant realization is<br />
<strong>Eclipse iceoryx</strong> — a low-level zero-copy shared-memory IPC (&quot;plumbing&quot;) that higher layers wrap:<br />
it sits <em>under</em> both ROS 2 (via <code>rmw_iceoryx</code>) and some <code>ara::com</code> implementations, not either API itself</li>
<li><strong>The single most transferable idea</strong>: <strong>the application API is protocol-agnostic; DDS/SOME-IP<br />
is a swappable binding underneath</strong> — exactly like ROS 2's <code>rmw</code>/DDS layering</li>
</ul>
<div class="gloss">SOME/IP = Scalable service-Oriented MiddlewarE over IP · SD = Service Discovery · DDS = Data Distribution Service (OMG) · QoS = Quality of Service · RTPS = the DDS wire protocol · IPC = Inter-Process Communication · iceoryx = the shared-memory zero-copy IPC shared with ROS 2 · `rmw` = ROS 2's middleware-abstraction layer</div>
</section>

<h2 id="ucm--ota-the-automotive-way">UCM — OTA the automotive way</h2>
<ul>
<li>The unit of update is the <strong>Software Cluster</strong>: AP can be extended <em>&quot;with new software packages<br />
without re-flashing the entire ECU.&quot;</em> The per-machine <strong>UCM</strong> (<code>ara::ucm::PackageManagement</code>)<br />
runs the workflow <strong>Transfer → Process → Activate → (Verify/Finish or Rollback)</strong>:
<ol>
<li><strong>Transfer</strong> — stream the package (<code>TransferStart → TransferData → TransferExit</code>)</li>
<li><strong>Process</strong> — <code>ProcessSwPackage</code> unpacks, validates, writes the cluster</li>
<li><strong>Activate</strong> — <em>UCM asks State Management for an update session</em>, SM stops the outdated<br />
clusters' processes, UCM makes the new ones available; <code>VerifyUpdate</code> → <code>Finish</code> commits</li>
</ol>
</li>
<li><strong>Rollback is best-effort, NOT guaranteed</strong> — the spec documents a <em>failing</em> rollback<br />
(<code>UCM ROLLBACK FAILED</code>). For an MCU engineer: the A/B-bank reflash idea, but per-cluster and<br />
coordinated with a state machine, not a bootloader</li>
<li><strong>Vehicle-wide OTA = V-UCM (Vehicle UCM)</strong> — formerly &quot;UCM Master,&quot; now its <strong>own spec since<br />
R23-11</strong>. It coordinates the campaign: <strong>backend</strong> (authenticate the Vehicle Package, resolve<br />
inter-cluster dependencies), <strong>Vehicle State Manager</strong> (apply safety conditions), and<br />
<strong>driver consent</strong>. Chain: <strong>OEM backend → V-UCM → subordinate per-machine UCM instances</strong></li>
</ul>
<div class="gloss">UCM = Update and Configuration Management (per machine) · V-UCM = Vehicle UCM (vehicle-wide campaign coordinator) · Software Cluster = AP's unit of deployment/update · Vehicle Package = the signed bundle V-UCM authenticates · A/B bank = the dual-slot reflash pattern from MCU bootloaders</div>
</section>

<h2 id="diagnostics-on-ap--one-cluster-does-dcm--dems-jobs">Diagnostics on AP — one cluster does DCM + DEM's jobs</h2>
<ul>
<li><em>&quot;The DM is a diagnostic server … that realizes a UDS server instance according to<br />
ISO 14229-1 and SOVD according to ASAM.&quot;</em> Since R19-03 the interface is C++ (<code>ara::diag</code>),<br />
configured from the <strong>Diagnostic Extract Template (DEXT)</strong>. Where CP splits diagnostics into<br />
<strong>DCM + DEM</strong> BSW modules, <strong>AP merges both roles into one cluster</strong> — one <code>ara::diag</code> API</li>
<li><strong>One Diagnostic Server Instance per Software Cluster</strong>, and all instances <em>&quot;share a single<br />
TransportLayer instance (e.g. DoIP on TCP/IP port 13400)&quot;</em></li>
<li><strong>Transport phrasing — get it exactly right</strong>: <strong>DoIP (ISO 13400-2:2019) is the only<br />
<em>standardized</em> UDS transport for the AP DM; the SWS explicitly permits a custom transport.</strong><br />
Verbatim: <em>&quot;the DoIP protocol … or a custom implementation of a transport protocol can be<br />
used.&quot;</em> <strong>Do not repeat the refuted web claim &quot;R24-11 added CAN transport&quot; — a hallucination</strong>;<br />
DoIP-only-as-standard is confirmed against the R24-11 <strong>and R25-11</strong> SWS texts (this research<br />
re-read both; earlier releases not re-checked)</li>
<li><strong>SOVD is realized <em>inside</em> the DM + a SOVD Gateway — there is no separate &quot;SOVD cluster.&quot;</strong><br />
It's a modern API over <strong>HTTP/REST + JSON + OAuth</strong>, self-describing, <em>&quot;UDS as a subset,&quot;</em> and<br />
can front legacy ECUs via <strong>SOVD→UDS translation</strong>. <em>ISO transition mid-flight</em>: R25-11 cites<br />
ISO 17978-3:2025/2026 &amp; ASAM SOVD 1.1, but warns 1.1 is <em>&quot;not yet (fully) supported&quot;</em></li>
</ul>

<h2 id="phm-and-persistency--supervision-and-stored-state">PHM and Persistency — supervision and stored state</h2>
<ul>
<li><strong>Platform Health Management (<code>ara::phm</code>)</strong> is AP's analogue of CP's WdgM, required by<br />
ISO 26262. Three supervisions — <strong>Alive</strong>, <strong>Deadline</strong>, <strong>Logical</strong> — over <strong>Checkpoints</strong><br />
apps report via <code>ReportCheckpoint</code>, aggregated into a <strong>Global Supervision Status</strong> per<br />
Function Group</li>
<li>On failure, <strong>PHM notifies State Management</strong> (which decides + triggers recovery — e.g. restart<br />
a Function Group); <em>&quot;if no response … is received in time, the PHM will do its own<br />
countermeasures&quot;</em> via the <strong>hardware watchdog</strong></li>
<li><em>Release-stamped</em>: <strong>Health Channels are obsolete</strong> (set obsolete R21-11, &quot;Removed&quot; R24-11) —<br />
material presenting them as a live PHM input is out of date</li>
<li><strong>Persistency (<code>ara::per</code>)</strong> provides <strong>Key-Value Storage</strong> and <strong>File Storage</strong>, with<br />
<strong>redundancy</strong> <em>&quot;configured to use replication of stored data, CRCs, or Hashes&quot;</em> and defined<br />
<strong>Install / Update / Finalize / Roll-Back of persistent data</strong> across Software-Cluster updates.<br />
The guarantee is <em>defined install/update/finalize semantics with a rollback path</em> — <strong>not<br />
transparent automatic migration</strong></li>
<li><strong>Log &amp; Trace</strong> exposes <code>ara::log</code> over the <strong>DLT</strong> protocol (note SOVD logging is <em>not</em><br />
standardized through <code>ara::log</code>)</li>
</ul>
<div class="gloss">PHM = Platform Health Management · WdgM = CP's Watchdog Manager (the analogue) · Checkpoint = the point an app reports it reached · `ara::per` = the persistency cluster · KVS = Key-Value Storage · DLT = Diagnostic Log and Trace protocol</div>
</section>

<h2 id="the-mid-2026-reality--oses-vendors-and-the-asil-hedge">The mid-2026 reality — OSes, vendors, and the ASIL hedge</h2>
<ul>
<li><strong>The OS underneath is a separate procurement + certification decision.</strong> <strong>QNX</strong> is the<br />
de-facto safety OS — QNX OS for Safety is ISO 26262 <strong>ASIL-D</strong> certified (~35–38% of the<br />
<em>overall</em> automotive-OS market by analyst estimates — an OS-type share, not a safety-only figure).<br />
<strong>Linux</strong> carries most non-safety/ADAS compute but<br />
can't itself certify above ~ASIL-B (reached via a <strong>certified hypervisor</strong> or safety companion).<br />
<strong>PikeOS, INTEGRITY, VxWorks</strong> also appear</li>
<li><strong>The exact hedge to keep — &quot;ASIL-B shipping, ASIL-D programs underway&quot;:</strong></li>
</ul>

<th>Stated safety (mid-2026)</th>

<td>ASIL-B in first series projects; Vector's own <strong>ASIL-D target 2026</strong>; a <em>separate</em> Vector–QNX deal (Jun 2024) targets ASIL-D on QNX OS, no date</td>
</tr>
<tr>
<td><strong>ETAS RTA-VRTE</strong></td>
<td><strong>ISO 26262 ASIL-B certified, TÜV SÜD, March 2025</strong></td>
</tr>
<tr>
<td><strong>Qorix</strong> (KPIT+ZF JV, Qualcomm shareholder)</td>
<td><strong>TÜV SÜD ASIL-B certified, Aug 2025</strong></td>

<h2 id="the-real-shape-of-ap-code">The real shape of AP code</h2>

<p><strong>C++ — the Adaptive Application → Execution Management state handshake</strong> (<code>langroodi/Adaptive-AUTOSAR</code>, dormant since 2023-06-22):</p>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-cpp">            <span class="hljs-comment">/// @brief Report the application internal state to Execution Management</span>
            <span class="hljs-comment">/// @param state Application current internal state</span>
            <span class="hljs-comment">/// @returns Void Result if the state reporting was successful, otherwise a Result containing the occurred error</span>
            ara::<span class="hljs-function">core::Result&lt;<span class="hljs-type">void</span>&gt; <span class="hljs-title">ReportExecutionState</span><span class="hljs-params">(
                ExecutionState state)</span> <span class="hljs-type">const</span></span>;
</code></pre>
<p class="attr"><a href="https://github.com/langroodi/Adaptive-AUTOSAR/blob/866d158a10d895f1d269689a8ddf8153dc03b321/src/ara/exec/execution_client.h#L54-L58">langroodi/Adaptive-AUTOSAR @ 866d158 — src/ara/exec/execution_client.h</a></p>
<p><strong>Rust — the <code>ara::com</code> skeleton <code>OfferService</code> lifecycle</strong> (<code>ZiadAhmed9/ara-rs</code>, created 2026-03-30):</p>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-rust">    <span class="hljs-comment">/// Advertise this service instance so that remote proxies can find it.</span>
    <span class="hljs-keyword">pub</span> <span class="hljs-keyword">async</span> <span class="hljs-keyword">fn</span> <span class="hljs-title function_">offer</span>(
        &amp;<span class="hljs-keyword">self</span>,
        major_version: MajorVersion,
        minor_version: MinorVersion,
    ) <span class="hljs-punctuation">-&gt;</span> <span class="hljs-type">Result</span>&lt;(), AraComError&gt; {
        <span class="hljs-keyword">self</span>.transport
            .<span class="hljs-title function_ invoke__">offer_service</span>(
                <span class="hljs-keyword">self</span>.service_id,
                <span class="hljs-keyword">self</span>.instance_id,
                major_version,
                minor_version,
            )
            .<span class="hljs-keyword">await</span>
    }
</code></pre>
<p class="attr"><a href="https://github.com/ZiadAhmed9/ara-rs/blob/3bb2a86f8570c84be2d0e7cea9e31aa1d6409f67/ara-com/src/skeleton.rs#L46-L60">ZiadAhmed9/ara-rs @ 3bb2a86 — ara-com/src/skeleton.rs</a></p>
<div class="gloss">What to notice: both return an **`ara::core::Result` / `Result<…, AraComError>`** — AP signals errors as a *returned value*, **not a thrown exception**; `ReportExecutionState` is the **contract every AA implements** so EM knows it reached `kRunning`; `offer()`/`stop_offer()` are the **`OfferService`/`StopOfferService` skeleton lifecycle**. Educational caveat: the C++ repo is **dormant (3 years cold)** and the Rust repo is **weeks old** — read them to learn the shape; neither is conformant or production-grade. AA = Adaptive Application · EM = Execution Management.</div>
</section>

<td>Apache-2.0</td>
<td><strong>v2.0.8, 2026-05-19</strong> — maintained</td>
<td>zero-copy shared-memory IPC; ships <code>iceoryx-automotive-soa</code>, per its README <em>&quot;a Binding for automotive frameworks like AUTOSAR Adaptive <code>ara::com</code>&quot;</em> (its &quot;Where is iceoryx used&quot; table labels <strong>RTA-VRTE (ETAS)</strong> and <strong>AVIN AGNOSAR</strong> as AUTOSAR Adaptive Platform products, while <strong>Apex.Ida is listed as safe/certified middleware without the AP label</strong>)</td>
</tr>
<tr>
<td><strong>Eclipse iceoryx2</strong></td>
<td>Apache-2.0 OR MIT</td>
<td><strong>v0.9.3, 2026-07-08</strong> (pre-1.0) — very active</td>
<td>Rust-core zero-copy IPC successor; its README/FAQ describe safety-critical ambitions (<em>&quot;designed to operate in safety-critical systems&quot;</em>) but make <strong>no AUTOSAR / ISO 26262 / ASIL certification claim</strong></td>
</tr>
<tr>
<td><strong>eProsima Fast DDS</strong></td>
<td>Apache-2.0</td>
<td><strong>v3.6.2, 2026-07-02</strong> — very active</td>
<td>full OMG <strong>DDS/RTPS</strong>; DDS is one of the three standardized <code>ara::com</code> network bindings (SOME/IP · Signal-Based · DDS), so technically eligible — but <strong>not</strong> the documented AP Demonstrator binding (that reference work is RTI Connext, proprietary)</td>
</tr>
<tr>
<td><strong>CommonAPI C++ / -SomeIP</strong> (COVESA)</td>
<td>MPL-2.0</td>
<td><strong>dormant since 2024-10-09</strong></td>
<td>Franca-IDL proxy/stub codegen whose shape <em>rhymes with</em> <code>ara::com</code> proxies/skeletons — but a separate, <strong>non-AUTOSAR</strong> lineage</td>
</tr>
</tbody>
</table>
<p><strong>Takeaway:</strong> the <strong>protocol/transport layer</strong> of AP is fully available as production open source — the <strong><code>ara::</code> API layer</strong> is not.</p>
<div class="gloss">SOME/IP = Scalable service-Oriented MiddlewarE over IP · SD = Service Discovery · E2E = End-to-End protection · IPC = Inter-Process Communication · DDS/RTPS = Data Distribution Service + its wire protocol (OMG) · MPL = Mozilla Public License · Franca IDL = the interface-definition language CommonAPI generates from (the non-AUTOSAR analogue to ARXML) · all versions/dates verified 2026-07-16</div>
</section>

<h2 id="the-open-ecosystem-around-ap--and-where-the-line-sits">The open ecosystem around AP — and where the line sits</h2>

<ul>
<li><strong>Eclipse S-CORE</strong> (Apache-2.0, dual-language <strong>C++/Rust</strong> — never Rust-first; launched <strong>2025-06-12</strong>; backers BMW Group, Mercedes-Benz, Bosch, ETAS, QNX, Qorix, Accenture) is an open SDV <strong>core stack</strong>, <strong>not an AP implementation</strong>, and <strong>makes no AP-compatibility claim</strong> — no official statement either way (community discussions about a compatibility/mapping layer exist — eclipse-score GitHub discussions #759, #882 — but nothing official). Its comms module <strong>LoLa</strong> is <em>&quot;a communication middleware implementation based on the Adaptive AUTOSAR Communication Management specification&quot;</em> / <em>&quot;Partial implementation of Adaptive AUTOSAR Communication Management (ara::com)&quot;</em> (its README also self-describes <strong>ASIL-B qualified</strong>) — yet its API namespace is <strong><code>score::mw::com</code>, not <code>ara::com</code></strong>, and its IPC is built on <strong>boost.interprocess, not iceoryx</strong></li>
<li><strong>Eclipse OpenSOVD</strong> (Apache-2.0, mostly Rust, Eclipse <strong>Incubating</strong> (proposed 2025-05-26), active into July 2026) — an open implementation of <strong>SOVD (ISO 17978)</strong> that explicitly <strong>bridges AUTOSAR-Adaptive HPCs and legacy UDS ECUs</strong> and complements S-CORE. It sits exactly on this deck's <strong>Fleet <img class="emoji" draggable="false" alt="↔" src="https://cdn.jsdelivr.net/gh/jdecked/twemoji@17.0.2/assets/svg/2194.svg" data-marp-twemoji=""/> CP+AP walkthrough</strong> + <strong>fleet-uds-flow</strong> SOVD path: <a href="https://github.com/eclipse-opensovd/opensovd-core/blob/fe75a8e3a9142d11a0ed7152610e29003493de2a/opensovd-server/src/routes/mod.rs#L4-L18">its Rust REST route table</a> enumerates the <code>components → data</code> SOVD endpoints a diagnostics client speaks</li>
<li><strong>Same neighbourhood, none are AP</strong> (all Apache-2.0, all active): <strong>Eclipse Ankaios</strong> (workload orchestration for automotive HPCs — conceptually overlaps AP Execution Management) · <strong>Eclipse Kuksa</strong> (VSS signal databroker, Rust) · <strong>Eclipse uProtocol</strong> (transport-agnostic messaging; originated as a GM contribution, pairs with COVESA VSS/uServices)</li>
<li><strong>Classic contrast</strong>: Classic AUTOSAR has an open <strong>GPL-2.0</strong> lineage (Arctic Core, continued as <strong><code>openAUTOSAR/classic-platform</code></strong>, 2453 commits) — <strong>Adaptive has no equivalent open conformant stack</strong></li>
<li><strong>The boundary-keeper</strong>: the one complete official AP implementation is <strong>CAPI</strong>, <em>&quot;developed collaboratively by and for AUTOSAR partners&quot;</em> — <strong>partner-gated, not open source.</strong> That is why the honest line holds: open AP means education + building blocks + surrounding middleware, <strong>not a production AP stack</strong></li>
</ul>
<div class="gloss">SDV = Software-Defined Vehicle · LoLa = S-CORE's Low-Latency communication module · SOVD = Service-Oriented Vehicle Diagnostics (ISO 17978) · HPC = High-Performance Computer · UDS = Unified Diagnostic Services · VSS = Vehicle Signal Specification · CAPI = Common Adaptive Platform Implementation · the concrete AUTOSAR↔Eclipse tie is the SDV Alliance (formed March 2023, launched CES 2024) — see references</div>
</section>

<h2 id="cp-vs-ap--the-platform-split-12">CP vs AP — the platform split (1/2)</h2>

<table>
<thead>
<tr>
<th>Dimension</th>
<th><strong>Classic Platform (CP)</strong></th>
<th><strong>Adaptive Platform (AP)</strong></th>
</tr>
</thead>
<tbody>
<tr>
<td><strong>OS / kernel</strong></td>
<td>AUTOSAR OS — OSEK superset (SC1–SC4, no MMU)</td>
<td>not a new OS: an <strong>OS Interface</strong> on POSIX <strong>PSE51</strong> over Linux/QNX/PikeOS</td>
</tr>
<tr>
<td><strong>Language &amp; API</strong></td>
<td>C; RTE-generated <code>Rte_Read/Write/Call</code></td>
<td>C++14 (C++17 via MISRA C++:2023 merge); <code>ara::*</code></td>
</tr>
<tr>
<td><strong>Config time</strong></td>
<td>fully <strong>static</strong> — fixed pre-build (ECUC) → one binary</td>
<td><strong>dynamic</strong> — manifests bound late; discovery + start/stop at runtime</td>
</tr>
<tr>
<td><strong>Communication</strong></td>
<td><strong>signal</strong>-oriented — COM packs signals→I-PDUs on CAN/LIN/FlexRay/Ethernet</td>
<td><strong>service</strong>-oriented — <code>ara::com</code> proxy/skeleton over <strong>SOME/IP or DDS</strong></td>
</tr>
<tr>
<td><strong>Scheduling</strong></td>
<td>static priority table; hard RT by construction</td>
<td>POSIX <code>SCHED_FIFO</code>/<code>RR</code>, optional <code>SCHED_DEADLINE</code>; determinism <em>engineered</em></td>
</tr>
<tr>
<td><strong>Memory</strong></td>
<td>static allocation; MPU partitions; <strong>no heap in safety paths</strong></td>
<td><strong>dynamic allocation allowed and assumed</strong> (C++/STL); deterministic allocators</td>
</tr>
</tbody>
</table>
<div class="gloss">SC = Scalability Class · MMU = Memory Management Unit · PSE51 = minimal single-process POSIX profile · ECUC = ECU Configuration · I-PDU = Interaction-layer PDU · `SCHED_DEADLINE` = Linux EDF scheduler · every row is sourced in the references</div>
</section>

<h2 id="cp-vs-ap--the-platform-split-22">CP vs AP — the platform split (2/2)</h2>

<table>
<thead>
<tr>
<th>Dimension</th>
<th><strong>Classic Platform (CP)</strong></th>
<th><strong>Adaptive Platform (AP)</strong></th>
</tr>
</thead>
<tbody>
<tr>
<td><strong>Safety</strong></td>
<td>mature ISO 26262 <strong>up to ASIL D</strong> (first ASIL-D AUTOSAR impl certified 2016)</td>
<td>documented &quot;up to ASIL D,&quot; harder in practice; <strong>ASIL-B shipping, ASIL-D underway</strong></td>
</tr>
<tr>
<td><strong>Update</strong></td>
<td>reflash the <strong>whole ECU</strong> via bootloader/UDS (0x34/0x36/0x37)</td>
<td><strong>UCM</strong> — install/update individual Software Clusters; OTA-native</td>
</tr>
<tr>
<td><strong>Diagnostics</strong></td>
<td><strong>DCM + DEM</strong> — UDS over DoCAN/DoIP</td>
<td><strong>DM</strong> (<code>ara::diag</code>) — UDS server <em>and</em> SOVD; DoIP only standardized transport (custom permitted)</td>
</tr>
<tr>
<td><strong>Tooling</strong></td>
<td>Vector MICROSAR / EB tresos / ETAS RTA-CAR; DaVinci</td>
<td>Vector MICROSAR Adaptive / EB corbos / ETAS RTA-VRTE / Qorix</td>
</tr>
<tr>
<td><strong>Silicon</strong></td>
<td>MCUs: Infineon AURIX, NXP S32K, Renesas RH850</td>
<td>SoCs: NVIDIA Orin/Thor, Qualcomm, NXP S32G, Renesas R-Car</td>
</tr>
<tr>
<td><strong>Typical use</strong></td>
<td>brakes, EPS, body, powertrain — ASIL B–D actuators</td>
<td>ADAS/AD, HPC gateways, infotainment — often mixed-criticality with a CP safety island</td>
</tr>
</tbody>
</table>
<ul>
<li><strong>The &quot;up to ASIL D&quot; trap</strong>: on paper both are &quot;up to ASIL D.&quot; In practice AP's ASIL-D is<br />
achieved via mixed-criticality partitioning + a CP/lockstep companion — <strong>not</strong> the Linux/QNX<br />
host alone. <strong>Do not call AP &quot;low-ASIL,&quot; but do not call it &quot;ASIL-D certified&quot; either</strong></li>
</ul>
<div class="gloss">DCM/DEM = CP's diagnostic modules · DM = AP's Diagnostic Manager · UCM = Update and Configuration Management · DoCAN = Diagnostics over CAN (ISO 15765-2) · EPS = Electric Power Steering · AD = Autonomous Driving</div>
</section>

<h2 id="coexistence-in-one-2026-vehicle">Coexistence in one 2026 vehicle</h2>
<ul>
<li>A modern SDV runs <strong>both platforms at once</strong>: <strong>CP for the reflex nervous system, AP for the<br />
brain, Ethernet + gateways for the spine.</strong> Zonal/actuator ECUs run Classic on CAN/LIN/FlexRay;<br />
central HPCs run Adaptive on Linux/QNX over automotive Ethernet</li>
<li><strong>The signal<img class="emoji" draggable="false" alt="↔" src="https://cdn.jsdelivr.net/gh/jdecked/twemoji@17.0.2/assets/svg/2194.svg" data-marp-twemoji=""/>service (S2S) gateway</strong> is the key coexistence mechanism: it subscribes to<br />
Classic COM <strong>signals</strong>, repackages them, and offers them as SOME/IP <strong>services</strong> (and<br />
vice-versa) — <em>&quot;acting like a remote SOME/IP node.&quot;</em> Shipped by <strong>Vector MICROSAR</strong> (S2S<br />
add-on), <strong>Elektrobit</strong> (EB tresos + EB corbos), <strong>ETAS</strong> (RTA-CAR + RTA-VRTE)</li>
<li><strong>Diagnostics routing across the split — two distinct boxes</strong>: the <strong>TCU</strong> terminates the<br />
external 4G/5G link (TLS + certificates); a separate <strong>central gateway</strong> (DoIP router +<br />
<strong>firewall</strong> — the security chokepoint) routes <strong>DoIP</strong> on the backbone and re-transports it<br />
to <strong>DoCAN</strong> on CAN branches — <strong>raw UDS is never exposed to the internet; SOVD is the external API</strong></li>
<li><strong>The OEM &quot;wrap&quot; pattern</strong>: AUTOSAR adopted <em>selectively</em> inside a proprietary base layer.<br />
<strong>Mercedes MB.OS</strong> Base Layer was co-developed with Vector, <em>&quot;based on AUTOSAR Adaptive and<br />
Classic and the AUTOSAR Runtime Environment&quot;</em> — AUTOSAR is an <strong>ingredient, not the platform</strong>.<br />
VW's <strong>E³</strong> (E3 1.1 MEB / E3 1.2 PPE, CARIAD software) is <strong>domain-controller-based today</strong> (ICAS1–3 / five HPCs); its zonal + central-AP shape is the announced next step (<strong>SSP / E3 2.0</strong>)</li>
</ul>
<div class="gloss">SDV = Software-Defined Vehicle · S2S = Signal-to-Service gateway · TCU = Telematics Control Unit (modem + cloud endpoint) · MB.OS = Mercedes-Benz Operating System · MEB = VW's Modular Electric Drive Matrix · PPE = Premium Platform Electric · CARIAD = VW Group's software subsidiary · ICAS = In-Car Application Server · SSP = Scalable Systems Platform · migrating a function CP→AP is a re-architecting (new interface, rewrite in `ara::com`, manifests + UCM packaging, S2S gateway, re-done safety case) — not a recompile</div>
</section>

<h2 id="fleet-%E2%86%94-a-cpap-vehicle--one-request-end-to-end">Fleet <img class="emoji" draggable="false" alt="↔" src="https://cdn.jsdelivr.net/gh/jdecked/twemoji@17.0.2/assets/svg/2194.svg" data-marp-twemoji=""/> a CP+AP vehicle — one request, end to end</h2>

<p><strong>Read a fault code from a zonal brake ECU, starting in the cloud:</strong></p>
<ol>
<li>The backend speaks <strong>SOVD (REST/JSON over HTTPS)</strong> and collects <strong>MQTT telemetry</strong> — <strong>never raw UDS</strong>; the vehicle's entry point is the <strong>TCU</strong></li>
<li>The <strong>central gateway</strong> (DoIP router + firewall) is the security chokepoint for everything below it</li>
<li>Target lives on <strong>AP</strong> → the <strong>DM</strong> (<code>ara::diag</code>) on the HPC answers: UDS-over-DoIP, or SOVD natively</li>
<li>Target lives on <strong>CP</strong> → the gateway <strong>re-transports DoIP → DoCAN</strong>; the ECU's <strong>DCM+DEM</strong> answer. <strong>Same UDS bytes, different transport</strong> — the Classic ECU just sees &quot;a tester&quot;</li>
</ol>
<p><strong>Push an update:</strong> <strong>V-UCM</strong> on the HPC orchestrates the whole vehicle — AP <strong>Software Clusters</strong> go through UCM (transfer → process → activate, with rollback); CP ECUs are <strong>reflashed over UDS 0x34–0x37</strong> through the gateway, exactly like a workshop flash session</p>
<p><strong>Real vehicles shaped like this:</strong> <strong>Mercedes MB.OS</strong> — CP + AP coexisting under one Vector-built base layer (the named production example) · <strong>Rivian Gen 2</strong> — the zonal topology shipped for real: <strong>3 zone ECUs (West / East / South) + dual NVIDIA DRIVE Orin</strong> as central compute — cited for the <em>shape</em>; Rivian's software stack is its own, not an AUTOSAR deployment</p>
<div class="gloss">SOVD = Service-Oriented Vehicle Diagnostics (ISO 17978) · TCU = Telematics Control Unit · DoIP / DoCAN = UDS transports (ISO 13400 / ISO 15765-2) · DM = Diagnostic Manager (AP — one diagnostic server per Software Cluster) · DCM + DEM = Diagnostic Communication / Event Manager (CP) · V-UCM = Vehicle Update & Configuration Management · the punchline: one diagnostic language (UDS, ISO 14229), two transports, two server implementations</div>
</section>

<h2 id="convergence--the-two-worlds-are-moving-together">Convergence — the two worlds are moving together</h2>
<ul>
<li>The old dichotomy <em>&quot;signals = Classic, services = Adaptive; CAN = Classic, Ethernet = Adaptive&quot;</em><br />
is <strong>outdated at the standard level.</strong> R25-11-era moves close the gap:</li>
<li><strong>DDS on the Classic Platform (new in R25-11 — the headline).</strong> The CP Release Overview §2.1.1.5<br />
states management of <em>&quot;Events, Methods, and Fields, previously available through SOME/IP, are<br />
now extended to DDS&quot;</em> with a <em>&quot;new BSW module <strong>DDS Transformer</strong>,&quot;</em> <em>&quot;full support of<br />
ClientServerInterface,&quot;</em> and integration of the OMG <strong>SPDP/SEDP</strong> discovery protocols plus AP's<br />
Service Discovery. <strong>Hedge to preserve: this is a <em>standard-level concept new in R25-11</em> — no<br />
shipping vendor implementation was verified; adoption timelines unconfirmed.</strong> In principle a CP<br />
ECU can join the same DDS databus AP and ROS 2 already use</li>
<li><strong>Dynamic memory, blessed on purpose</strong> — the heap is permitted on the compute side, provided<br />
determinism is engineered back in (a philosophical convergence with the C++ application world)</li>
<li><strong>MISRA C++:2023 merge</strong> — the AUTOSAR C++14 guidelines folded into one industry standard<br />
targeting C++17 (formal ARA C++17 move stays open)</li>
<li><strong>SOVD as the external-facing diagnostic API</strong> (ISO 17978-3, REST/JSON/OAuth) and <strong>Eclipse<br />
S-CORE</strong> (open, dual-language C++/Rust, built by AUTOSAR's own members) are the other convergence signals</li>
</ul>
<div class="gloss">DDS = Data Distribution Service · SPDP/SEDP = the OMG Simple Participant / Endpoint Discovery Protocols · BSW = Basic Software · the CP DDS Transformer is R25-11 standard-level only — never present it as shipping</div>
</section>

<h2 id="where-ros-2-sits--next-to-not-inside-autosar">Where ROS 2 sits — next to, not inside, AUTOSAR</h2>
<ul>
<li>ROS 2 and AP <strong>share the DDS wire family</strong> (ROS 2's default RMW is DDS; AP has a DDS binding<br />
since R18-03) — <strong>but they are NOT plug-compatible.</strong> Blockers to naive DDS-to-DDS: ROS 2<br />
mangles topic names (<code>rt/…</code>, <code>rq/…</code>, <code>rr/…</code>) while AP-DDS uses <code>&quot;ara.com://services/…&quot;</code><br />
partitions; type construction differs; AP's USER_DATA discovery mode isn't in ROS 2. <strong>Interop<br />
goes through a bridge/gateway</strong> (SOME/IP-DDS, ROS2-SOME/IP) — an active 2024–2026 research area</li>
<li><strong>Positioning — prototyping/R&amp;D vs production</strong>: Apex.AI frames it as <em>&quot;ROS 2 … code-first …<br />
as easy as possible to develop&quot;</em> vs <em>&quot;AUTOSAR … interoperability between suppliers and OEMs.&quot;</em><br />
A 2026 arXiv comparison finds ROS 2 <em>&quot;lacks several concepts essential for series-production&quot;</em><br />
(operation modes, allocation control, watchdog supervision) — <strong>which is why AP exists alongside<br />
ROS 2 rather than replacing it</strong></li>
<li><strong>The safe-C++ playbook converges</strong>: the production ROS 2 derivative <strong>Apex.Grace</strong> is<br />
<em>&quot;certified by TÜV Nord as a Safety Element out of Context (SEooC) up to ASIL D.&quot;</em> It enforces<br />
static memory pools and eliminates runtime allocation — mirroring AP's deterministic-allocator<br />
discipline. One genuinely shared building block: <strong>iceoryx</strong> — the low-level zero-copy IPC that sits <em>under</em> both stacks via separate bindings</li>
</ul>
<div class="gloss">ROS 2 = Robot Operating System 2 · RMW = ROS Middleware abstraction · DDS/RTPS = the shared wire family · SEooC = Safety Element out of Context · Apex.Grace = the ASIL-D-certified ROS 2 derivative (formerly Apex.OS) · Autoware = the flagship open AD stack on ROS 2</div>
</section>

<h2 id="what-this-means-for-our-embedded-team">What this means for our embedded team</h2>
<ul>
<li><strong>Classic is the world you already half-know.</strong> Static config, no heap in safety paths,<br />
MPU partitions, E2E/SecOC, windowed watchdogs — <strong>it is the same functional-safety mindset you<br />
use on MCUs, formalized and code-generated.</strong> Learn CP to understand <em>why</em> automotive safety<br />
code looks the way it does</li>
<li><strong>Adaptive is where the &quot;big chip&quot; is going.</strong> Service-oriented, manifest-driven, OTA-updatable,<br />
C++ on POSIX — and its <strong>DDS binding is the bridge to the ROS 2 knowledge this repo already<br />
teaches.</strong> Learn AP (and ROS 2) to understand where the compute side is heading</li>
<li><strong>Carry the corrected mental models, not the folklore:</strong>
<ul>
<li><strong>DEM computes fault status; DCM only formats</strong> — the #1 conceptual error to avoid</li>
<li><strong>SecOC = authenticity + freshness, NOT encryption</strong></li>
<li><strong>OS Timing Protection = budgets, NOT deadline supervision</strong> (that's WdgM)</li>
<li><strong>Thor safety MCU = Renesas RH850U2A16, NOT AURIX</strong> (Orin = AURIX TC397X)</li>
<li><strong>&quot;DoIP-only&quot; only with &quot;standardized&quot; attached</strong>; <strong>CP is not CAN-only</strong>; <strong>AP is not low-ASIL</strong></li>
</ul>
</li>
<li><strong>The hands-on next step</strong>: contrast <code>github.com/langroodi/Adaptive-AUTOSAR</code> (MIT Linux AP<br />
simulator) with our <code>rclcpp</code>/DDS work — the natural bridge from ROS 2 into the AUTOSAR world</li>
</ul>
<div class="gloss">DEM/DCM = Diagnostic Event / Communication Manager · SecOC = Secure Onboard Communication · WdgM = Watchdog Manager · DoIP = Diagnostics over IP · every corrected model here is drawn from the three research docs behind this deck</div>
</section>

<h2 id="glossary--adaptive-platform-additions">Glossary — Adaptive Platform additions</h2>

<p><em>(Extends the main deck's three-slide glossary — SWC/RTE/BSW/MCAL/CDD/ARXML/OSEK/AUTOSAR-OS/ARA/POSIX/PSE51/UDS/DoCAN/DoIP/DCM/DEM/UCM/SOVD are defined there.)</em></p>
<ul>
<li><strong>FO / CP / AP</strong> — Foundation / Classic Platform / Adaptive Platform: the three members of one AUTOSAR standard set</li>
<li><strong>VFB</strong> — Virtual Functional Bus: the logical bus SWCs talk over; the RTE implements it per ECU</li>
<li><strong>COM / PduR / CanIf</strong> — Classic signal packing / PDU router / CAN interface — the build-time-frozen TX/RX chain</li>
<li><strong>E2E / SecOC</strong> — End-to-End protection (CRC+counter, ISO 26262) / Secure Onboard Communication (MAC + freshness, no encryption)</li>
<li><strong>NM / PN</strong> — Network Management (synchronized wake/sleep) / Partial Networking (a subset sleeps)</li>
<li><strong>EcuM / BswM</strong> — ECU State Manager (lifecycle edges) / BSW Mode Manager (steady-state rule engine)</li>
<li><strong>WdgM / StbM</strong> — Watchdog Manager (Alive/Deadline/Logical supervision) / Synchronized Time-Base Manager</li>
<li><strong>FFI</strong> — Freedom From Interference: ISO 26262 spatial/temporal isolation between mixed-ASIL software</li>
<li><strong>AA</strong> — Adaptive Application: a POSIX process (C++, PSE51) linked against ARA</li>
<li><strong>EM / SM</strong> — Execution Management (starts/stops processes — the enforcer) / State Management (decides which run — the brain)</li>
<li><strong>Function Group / Function Cluster</strong> — AP's unit of composition (a set of processes with states) / a platform building block (<code>ara::…</code>)</li>
<li><strong>Manifest</strong> — ARXML deployment config (Execution / Service-Instance / Machine / Raw-Data-Stream / Software-Distribution)</li>
<li><strong><code>ara::com</code></strong> — the one AP communication API (proxy/skeleton), bound to SOME/IP or DDS in the manifest</li>
<li><strong>event / trigger / method / field</strong> — the four <code>ara::com</code> service-element kinds (trigger = a data-less event)</li>
<li><strong>SOME/IP / DDS</strong> — the two standardized <code>ara::com</code> wire bindings (DDS present since R18-03)</li>
<li><strong>DM / V-UCM</strong> — Diagnostic Management (<code>ara::diag</code>, merges DCM+DEM) / Vehicle UCM (vehicle-wide OTA campaign coordinator)</li>
<li><strong>PHM / <code>ara::per</code></strong> — Platform Health Management (AP's WdgM analogue) / Persistency (KVS + File Storage)</li>
<li><strong>iceoryx</strong> — low-level zero-copy shared-memory IPC that sits under both AP and ROS 2 via separate bindings</li>
<li><strong>S-CORE / SOAFEE</strong> — Eclipse open dual-language (C++/Rust) SDV core stack / Arm-led cloud-native SDV architecture (containers, K8s, CI/CD)</li>
<li><strong>S2S gateway</strong> — Signal-to-Service gateway bridging Classic COM signals ⇄ SOME/IP services</li>
</ul>
</section>
