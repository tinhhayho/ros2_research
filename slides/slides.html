<h2 id="see-it--run-it--swap-it">see it · run it · swap it</h2>
<p>A hands-on intro: three live demos + a turtle you can drive.<br />
Everything runs in Docker — <strong>every number on these slides is from a real run.</strong></p>

<h2 id="why-ros-2">Why ROS 2?</h2>
<ul>
<li>Build systems from small processes (<strong>nodes</strong>) that talk over a network</li>
<li><strong>No central master</strong> — nodes find each other peer-to-peer</li>
<li>Rich <strong>QoS</strong> (reliability, durability, …) you tune per data stream</li>
<li>The transport is a <strong>swappable HAL</strong> — change the whole network stack with one env var</li>
<li>Scales down to microcontrollers via <strong>micro-ROS</strong></li>
</ul>
<blockquote>
<p>Firmware mental model: <strong>topics ≈ broadcast frames</strong>, <strong>services ≈ register read/write</strong>,<br />
<strong>actions ≈ a DMA/motor move</strong> with progress + cancel.</p>
</blockquote>
</section>

<h2 id="ros-1-vs-ros-2">ROS 1 vs ROS 2</h2>
<table>
<thead>
<tr>
<th></th>
<th>ROS 1</th>
<th>ROS 2</th>
</tr>
</thead>
<tbody>
<tr>
<td>Discovery</td>
<td>central <code>roscore</code></td>
<td><strong>distributed, no master</strong></td>
</tr>
<tr>
<td>Transport</td>
<td>custom TCPROS</td>
<td><strong>DDS (RTPS)</strong> / Zenoh, pluggable</td>
</tr>
<tr>
<td>QoS</td>
<td>basically reliable-only</td>
<td><strong>rich, per-stream QoS</strong></td>
</tr>
<tr>
<td>Small targets</td>
<td>not designed for it</td>
<td><strong>micro-ROS</strong> on MCUs</td>
</tr>
<tr>
<td>Multi-vendor</td>
<td>—</td>
<td>swap Fast DDS / Cyclone / Zenoh</td>
</tr>
</tbody>
</table>
</section>

<h2 id="demo-1--pubsub--service--action">Demo 1 — pub/sub + service + action</h2>
<p><span class="cmd">./run.sh demo-1</span></p>
<p>What you'll see (all real):</p>
<ul>
<li>A <strong>Python</strong> talker <em>and</em> a <strong>C++</strong> talker on the same <code>/chatter</code> — one listener hears both</li>
<li>Service: <code>AddTwoInts(2, 3)</code> → <strong><code>sum=5</code></strong></li>
<li>Action: Fibonacci streams <strong>feedback</strong> <code>[0,1,1] → [0,1,1,2] → …</code>, then a result</li>
<li><code>ros2 node list</code> shows <strong>5 separate processes</strong> that found each other with <strong>no master</strong></li>
</ul>
</section>

<h2 id="run-the-visual-demos-live">Run the visual demos live</h2>
<p><span class="cmd">./run.sh viz</span> — turtlesim window; <strong>drive the turtle with the arrow keys</strong></p>
<p><span class="cmd">./run.sh rqt</span> — live node/topic graph (rqt_graph)</p>
<p><span class="cmd">./run.sh demo-1</span> — then run <code>./run.sh rqt</code> in a second terminal to watch the graph</p>
<blockquote>
<p><code>viz</code> makes topics (<code>/turtle1/cmd_vel</code>, <code>/turtle1/pose</code>) and services (<code>/spawn</code>, <code>/clear</code>)<br />
<strong>visible</strong> — the same concepts from Demo 1, but you can watch them move.</p>
</blockquote>

<h2 id="takeaways">Takeaways</h2>
<ol>
<li>ROS 2 = distributed nodes, <strong>no master</strong>, rich QoS</li>
<li><strong>Topics / services / actions</strong> = stream / RPC / long task</li>
<li><strong>QoS must agree on both ends</strong> — and it warns you when it doesn't</li>
<li>The <strong>RMW is a HAL</strong> — swap Fast DDS / Cyclone / Zenoh with one env var</li>
<li><strong>micro-ROS</strong> takes the same model down to an MCU</li>
</ol>
<p>Try it now: <span class="cmd">./run.sh build &amp;&amp; ./run.sh demo-1 &amp;&amp; ./run.sh viz</span></p>
</section>
