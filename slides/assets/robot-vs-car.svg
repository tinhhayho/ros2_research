<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 600" width="960" height="600" font-family="Helvetica, Arial, sans-serif">
  <rect x="0" y="0" width="960" height="600" fill="#ffffff"/>
  <defs>
    <marker id="arrL" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L9,3 L0,6 z" fill="#2E5FAC"/>
    </marker>
  </defs>

  <!-- Title -->
  <text x="480" y="42" text-anchor="middle" font-size="26" font-weight="700" fill="#1b2b4a">One silicon, two worlds</text>

  <!-- ===================== LEFT PANEL: robots ===================== -->
  <rect x="20" y="78" width="360" height="480" rx="8" fill="#EAF1FB" stroke="#9BBCE0" stroke-width="1.5"/>
  <text x="200" y="106" text-anchor="middle" font-size="16" font-weight="700" fill="#234">PHYSICAL AI — robots</text>

  <!-- Humanoid robot pictogram, centered at cx=200, baseline ~278 -->
  <g>
    <!-- antenna -->
    <line x1="200" y1="120" x2="200" y2="132" stroke="#2E5FAC" stroke-width="2.5" stroke-linecap="round"/>
    <circle cx="200" cy="118" r="3.5" fill="#2E5FAC"/>
    <!-- legs (drawn first so torso/feet sit on top) -->
    <polyline points="186,238 182,260 184,272" fill="none" stroke="#2E5FAC" stroke-width="12" stroke-linecap="round" stroke-linejoin="round"/>
    <polyline points="214,238 218,260 216,272" fill="none" stroke="#2E5FAC" stroke-width="12" stroke-linecap="round" stroke-linejoin="round"/>
    <rect x="171" y="268" width="20" height="10" rx="4" fill="#DCE9F7" stroke="#2E5FAC" stroke-width="2"/>
    <rect x="209" y="268" width="20" height="10" rx="4" fill="#DCE9F7" stroke="#2E5FAC" stroke-width="2"/>
    <!-- arms -->
    <polyline points="170,186 146,208 152,236" fill="none" stroke="#2E5FAC" stroke-width="10" stroke-linecap="round" stroke-linejoin="round"/>
    <polyline points="230,186 254,208 248,236" fill="none" stroke="#2E5FAC" stroke-width="10" stroke-linecap="round" stroke-linejoin="round"/>
    <circle cx="152" cy="236" r="7" fill="#DCE9F7" stroke="#2E5FAC" stroke-width="2"/>
    <circle cx="248" cy="236" r="7" fill="#DCE9F7" stroke="#2E5FAC" stroke-width="2"/>
    <!-- torso -->
    <rect x="170" y="176" width="60" height="64" rx="12" fill="#DCE9F7" stroke="#2E5FAC" stroke-width="3"/>
    <rect x="191" y="196" width="18" height="12" rx="3" fill="#ffffff" stroke="#2E5FAC" stroke-width="1.5"/>
    <!-- neck -->
    <rect x="194" y="170" width="12" height="8" fill="#ffffff" stroke="#2E5FAC" stroke-width="2"/>
    <!-- head -->
    <circle cx="200" cy="152" r="20" fill="#ffffff" stroke="#2E5FAC" stroke-width="3"/>
    <circle cx="193" cy="150" r="3" fill="#2E5FAC"/>
    <circle cx="207" cy="150" r="3" fill="#2E5FAC"/>
    <path d="M194,158 Q200,163 206,158" fill="none" stroke="#2E5FAC" stroke-width="2" stroke-linecap="round"/>
  </g>

  <!-- Chips: left panel -->
  <rect x="40" y="300" width="320" height="42" rx="8" fill="#ffffff" stroke="#2E5FAC" stroke-width="1.5"/>
  <text x="200" y="326" text-anchor="middle" font-size="14" fill="#234">ROS 2 + Isaac ROS</text>

  <rect x="40" y="354" width="320" height="42" rx="8" fill="#ffffff" stroke="#2E5FAC" stroke-width="1.5"/>
  <text x="200" y="380" text-anchor="middle" font-size="14" fill="#234">Ubuntu 24.04 + PREEMPT_RT</text>

  <rect x="40" y="408" width="320" height="42" rx="8" fill="#ffffff" stroke="#2E5FAC" stroke-width="1.5"/>
  <text x="200" y="434" text-anchor="middle" font-size="14" fill="#234">GR00T — 3B VLA, open</text>

  <rect x="40" y="462" width="320" height="42" rx="8" fill="#ffffff" stroke="#2E5FAC" stroke-width="1.5"/>
  <text x="200" y="488" text-anchor="middle" font-size="14" fill="#234">Jetson Thor · 128 GB · $3,499</text>

  <!-- ===================== CENTER PANEL: shared ===================== -->
  <rect x="395" y="78" width="170" height="480" rx="8" fill="#DFF0D8" stroke="#8FBF8F" stroke-width="1.5"/>
  <text x="480" y="106" text-anchor="middle" font-size="16" font-weight="700" fill="#2d5a2d">SHARED</text>

  <rect x="403" y="300" width="154" height="42" rx="8" fill="#ffffff" stroke="#2d5a2d" stroke-width="1.5"/>
  <text x="480" y="317" text-anchor="middle" font-size="12" fill="#2d5a2d">Thor SoC</text>
  <text x="480" y="332" text-anchor="middle" font-size="12" fill="#2d5a2d">(Blackwell)</text>

  <rect x="403" y="354" width="154" height="42" rx="8" fill="#ffffff" stroke="#2d5a2d" stroke-width="1.5"/>
  <text x="480" y="380" text-anchor="middle" font-size="12.5" fill="#2d5a2d">Cosmos world model</text>

  <rect x="403" y="408" width="154" height="42" rx="8" fill="#ffffff" stroke="#2d5a2d" stroke-width="1.5"/>
  <text x="480" y="434" text-anchor="middle" font-size="13" fill="#2d5a2d">TensorRT</text>

  <rect x="403" y="462" width="154" height="42" rx="8" fill="#ffffff" stroke="#2d5a2d" stroke-width="1.5"/>
  <text x="480" y="488" text-anchor="middle" font-size="12.5" fill="#2d5a2d">3-computer loop</text>

  <!-- short connecting arrows -->
  <line x1="393" y1="398" x2="382" y2="398" stroke="#2E5FAC" stroke-width="2.5" marker-end="url(#arrL)"/>
  <line x1="567" y1="398" x2="578" y2="398" stroke="#2E5FAC" stroke-width="2.5" marker-end="url(#arrL)"/>

  <!-- ===================== RIGHT PANEL: automotive ===================== -->
  <rect x="580" y="78" width="360" height="480" rx="8" fill="#FCE8D5" stroke="#E0A96D" stroke-width="1.5"/>
  <text x="760" y="106" text-anchor="middle" font-size="16" font-weight="700" fill="#6B4A2B">AUTOMOTIVE — DRIVE</text>

  <!-- Car pictogram, side view, centered at cx=760, baseline ~284 -->
  <g>
    <!-- lower body -->
    <rect x="630" y="214" width="260" height="44" rx="20" fill="#ffffff" stroke="#2E5FAC" stroke-width="3"/>
    <!-- cabin / greenhouse -->
    <path d="M690,214 L702,164 Q706,156 716,156 L804,156 Q814,156 818,164 L830,214 Z" fill="#DCE9F7" stroke="#2E5FAC" stroke-width="3" stroke-linejoin="round"/>
    <!-- pillar dividing windshield / rear window -->
    <line x1="760" y1="156" x2="760" y2="214" stroke="#2E5FAC" stroke-width="3"/>
    <!-- door line -->
    <line x1="760" y1="214" x2="760" y2="258" stroke="#2E5FAC" stroke-width="2"/>
    <!-- headlight / taillight -->
    <circle cx="880" cy="236" r="4.5" fill="#FCE8D5" stroke="#2E5FAC" stroke-width="1.5"/>
    <rect x="636" y="230" width="7" height="10" rx="2" fill="#F8D7DA" stroke="#2E5FAC" stroke-width="1.5"/>
    <!-- wheels -->
    <circle cx="675" cy="258" r="26" fill="#ECECEC" stroke="#2E5FAC" stroke-width="3"/>
    <circle cx="675" cy="258" r="9" fill="#ffffff" stroke="#2E5FAC" stroke-width="2"/>
    <circle cx="845" cy="258" r="26" fill="#ECECEC" stroke="#2E5FAC" stroke-width="3"/>
    <circle cx="845" cy="258" r="9" fill="#ffffff" stroke="#2E5FAC" stroke-width="2"/>
  </g>

  <!-- Chips: right panel -->
  <rect x="600" y="300" width="320" height="42" rx="8" fill="#ffffff" stroke="#b06a2a" stroke-width="1.5"/>
  <text x="760" y="326" text-anchor="middle" font-size="13.5" fill="#6B4A2B">DriveWorks SDK (no "ROS of cars")</text>

  <rect x="600" y="354" width="320" height="42" rx="8" fill="#ffffff" stroke="#b06a2a" stroke-width="1.5"/>
  <text x="760" y="380" text-anchor="middle" font-size="14" fill="#6B4A2B">DriveOS 7: QNX + Linux VMs</text>

  <rect x="600" y="408" width="320" height="42" rx="8" fill="#ffffff" stroke="#b06a2a" stroke-width="1.5"/>
  <text x="760" y="434" text-anchor="middle" font-size="14" fill="#6B4A2B">Alpamayo — 10.5B VLA, gated</text>

  <rect x="600" y="462" width="320" height="42" rx="8" fill="#ffffff" stroke="#b06a2a" stroke-width="1.5"/>
  <text x="760" y="488" text-anchor="middle" font-size="14" fill="#6B4A2B">DRIVE Thor · 64 GB · GMSL cameras</text>

  <!-- Footnote -->
  <text x="480" y="580" text-anchor="middle" font-size="12.5" fill="#667">VLA = Vision-Language-Action model (camera + text in, motion out) · GMSL = automotive camera serial link · QNX = safety-certified real-time OS</text>
</svg>
