<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 600" width="960" height="600" font-family="Helvetica, Arial, sans-serif">
  <rect x="0" y="0" width="960" height="600" fill="#ffffff"/>

  <defs>
    <marker id="arr" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L9,3 L0,6 z" fill="#444"/>
    </marker>
    <marker id="arrL" markerWidth="10" markerHeight="10" refX="1" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M9,0 L0,3 L9,6 z" fill="#444"/>
    </marker>
  </defs>

  <!-- Title -->
  <text x="480" y="42" text-anchor="middle" font-size="26" font-weight="700" fill="#1b2b4a">Inside Jetson Thor (T5000) — the flagship robot chip</text>

  <!-- ===================== Top-right power/price badge ===================== -->
  <rect x="785" y="56" width="155" height="42" rx="8" fill="#FCE8D5" stroke="#D9A56A" stroke-width="1.5"/>
  <text x="862" y="73" text-anchor="middle" font-size="12.5" font-weight="700" fill="#6B4A2B">40–130 W</text>
  <text x="862" y="90" text-anchor="middle" font-size="12.5" font-weight="700" fill="#6B4A2B">$3,499 devkit</text>

  <!-- ===================== Die outline ===================== -->
  <rect x="230" y="105" width="520" height="340" rx="10" fill="#ffffff" stroke="#444" stroke-width="2.5"/>
  <text x="490" y="128" text-anchor="middle" font-size="14" font-weight="700" fill="#444">Thor SoC — Blackwell architecture</text>
  <line x1="242" y1="140" x2="738" y2="140" stroke="#cccccc" stroke-width="1"/>

  <!-- ===================== GPU block ===================== -->
  <rect x="245" y="155" width="286" height="275" rx="8" fill="#DCE9F7" stroke="#6F9BD1" stroke-width="1.5"/>
  <text x="388" y="177" text-anchor="middle" font-size="14" font-weight="700" fill="#234">GPU — Blackwell</text>
  <text x="388" y="195" text-anchor="middle" font-size="11" font-style="italic" fill="#2E5FAC">MIG: 2 isolated partitions</text>

  <!-- MIG dashed divider -->
  <line x1="434" y1="205" x2="434" y2="422" stroke="#6F9BD1" stroke-width="1.5" stroke-dasharray="5,4"/>

  <!-- GPU spec chips (in larger MIG partition) -->
  <rect x="255" y="212" width="169" height="52" rx="6" fill="#ffffff" stroke="#B0B0B0" stroke-width="1.2"/>
  <text x="339.5" y="242" text-anchor="middle" font-size="12.5" fill="#333">2,560 CUDA cores</text>

  <rect x="255" y="274" width="169" height="52" rx="6" fill="#ffffff" stroke="#B0B0B0" stroke-width="1.2"/>
  <text x="339.5" y="304" text-anchor="middle" font-size="12.5" fill="#333">96 Tensor Cores</text>
  <text x="339.5" y="318" text-anchor="middle" font-size="12.5" fill="#333">(gen 5)</text>

  <rect x="255" y="336" width="169" height="52" rx="6" fill="#ffffff" stroke="#B0B0B0" stroke-width="1.2"/>
  <text x="339.5" y="358" text-anchor="middle" font-size="12.5" fill="#333">2,070 TFLOPS</text>
  <text x="339.5" y="372" text-anchor="middle" font-size="12.5" fill="#333">sparse FP4</text>

  <!-- ===================== CPU block ===================== -->
  <rect x="545" y="155" width="190" height="275" rx="8" fill="#EAF1FB" stroke="#7f9dc9" stroke-width="1.5"/>
  <text x="640" y="240" text-anchor="middle" font-size="13" font-weight="700" fill="#234">CPU — 14× Arm</text>
  <text x="640" y="256" text-anchor="middle" font-size="13" font-weight="700" fill="#234">Neoverse-V3AE</text>
  <text x="640" y="272" text-anchor="middle" font-size="13" font-weight="700" fill="#234">@ 2.6 GHz</text>

  <rect x="555" y="292" width="170" height="60" rx="6" fill="#ffffff" stroke="#B0B0B0" stroke-width="1.2"/>
  <text x="640" y="317" text-anchor="middle" font-size="12" fill="#333">1 MB L2/core ·</text>
  <text x="640" y="333" text-anchor="middle" font-size="12" fill="#333">16 MB shared L3</text>

  <!-- ===================== Memory block (LEFT) ===================== -->
  <rect x="20" y="220" width="165" height="110" rx="8" fill="#FCE8D5" stroke="#D9A56A" stroke-width="1.5"/>
  <text x="102" y="268" text-anchor="middle" font-size="13" fill="#6B4A2B">128 GB LPDDR5X</text>
  <text x="102" y="286" text-anchor="middle" font-size="13" fill="#6B4A2B">256-bit · 273 GB/s</text>

  <line x1="188" y1="275" x2="227" y2="275" stroke="#444" stroke-width="6" marker-start="url(#arrL)" marker-end="url(#arr)"/>
  <text x="207" y="203" text-anchor="middle" font-size="11" fill="#555">unified memory —</text>
  <text x="207" y="217" text-anchor="middle" font-size="11" fill="#555">CPU+GPU share it</text>

  <!-- ===================== I/O block (RIGHT) ===================== -->
  <rect x="780" y="220" width="150" height="110" rx="8" fill="#ECECEC" stroke="#B0B0B0" stroke-width="1.5"/>
  <text x="855" y="236" text-anchor="middle" font-size="13" font-weight="700" fill="#333">I/O</text>

  <rect x="790" y="244" width="130" height="24" rx="5" fill="#ffffff" stroke="#B0B0B0" stroke-width="1"/>
  <text x="855" y="260" text-anchor="middle" font-size="10.5" fill="#333">100 GbE (QSFP28)</text>

  <rect x="790" y="272" width="130" height="24" rx="5" fill="#ffffff" stroke="#B0B0B0" stroke-width="1"/>
  <text x="855" y="288" text-anchor="middle" font-size="10.5" fill="#333">PCIe Gen 5</text>

  <rect x="790" y="300" width="130" height="26" rx="5" fill="#ffffff" stroke="#B0B0B0" stroke-width="1"/>
  <text x="855" y="316" text-anchor="middle" font-size="10.5" fill="#333">Holoscan Sensor Bridge</text>

  <line x1="777" y1="275" x2="753" y2="275" stroke="#444" stroke-width="6" marker-end="url(#arr)"/>

  <!-- ===================== Software band ===================== -->
  <line x1="490" y1="447" x2="490" y2="457" stroke="#444" stroke-width="2" marker-end="url(#arr)"/>
  <rect x="20" y="460" width="920" height="50" rx="8" fill="#DFF0D8" stroke="#8FBF8F" stroke-width="1.5"/>
  <text x="480" y="490" text-anchor="middle" font-size="13" fill="#2d5a2d">JetPack 7 — Ubuntu 24.04 · kernel 6.8 · PREEMPT_RT option · CUDA 13</text>

  <!-- ===================== Footnote ===================== -->
  <text x="480" y="548" text-anchor="middle" font-size="12" fill="#667">Same silicon family as DRIVE AGX Thor (automotive) — differences are qualification + I/O + memory config, not the die</text>
  <text x="480" y="565" text-anchor="middle" font-size="12" fill="#667">Source: developer.nvidia.com "Introducing NVIDIA Jetson Thor" + Jetson Thor product page · MIG = Multi-Instance GPU · FP4 = 4-bit floating point</text>
</svg>
