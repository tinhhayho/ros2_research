<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 600" width="960" height="600" font-family="Helvetica, Arial, sans-serif">
  <rect x="0" y="0" width="960" height="600" fill="#ffffff"/>

  <defs>
    <marker id="arr" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L9,3 L0,6 z" fill="#444"/>
    </marker>
  </defs>

  <!-- Title -->
  <text x="480" y="40" text-anchor="middle" font-size="26" font-weight="700" fill="#1b2b4a">AUTOSAR Adaptive — a POSIX service-oriented platform, not an OS</text>

  <!-- ===================== Row 1: Adaptive Applications ===================== -->
  <rect x="150" y="64" width="620" height="78" rx="8" fill="#FCE8D5" stroke="#E0A96D" stroke-width="1.5"/>
  <text x="460" y="97" text-anchor="middle" font-size="13.5" font-weight="700" fill="#6B4A2B">Adaptive Applications — C++14 processes</text>
  <text x="460" y="118" text-anchor="middle" font-size="12.5" fill="#6B4A2B">each belongs to a Software Cluster: the unit of update and diagnosis</text>

  <line x1="460" y1="142" x2="460" y2="154" stroke="#444" stroke-width="2" marker-end="url(#arr)"/>

  <!-- ===================== Row 2: ARA (taller, 6 sub-boxes) ===================== -->
  <rect x="150" y="156" width="620" height="214" rx="8" fill="#DCE9F7" stroke="#7f9dc9" stroke-width="1.5"/>
  <text x="460" y="178" text-anchor="middle" font-size="14" font-weight="700" fill="#223344">ARA — AUTOSAR Runtime for Adaptive</text>

  <!-- ara::com -->
  <rect x="160" y="190" width="180" height="70" rx="6" fill="#DCE9F7" stroke="#7f9dc9" stroke-width="1.5"/>
  <text x="250" y="221" text-anchor="middle" font-size="10.5" fill="#223344">ara::com —</text>
  <text x="250" y="237" text-anchor="middle" font-size="10.5" fill="#223344">SOME/IP · DDS binding</text>

  <!-- ara::diag (highlighted) -->
  <rect x="360" y="190" width="180" height="70" rx="6" fill="#DFF0D8" stroke="#8FBF8F" stroke-width="1.5"/>
  <text x="450" y="221" text-anchor="middle" font-size="10.5" fill="#2d5a2d">ara::diag —</text>
  <text x="450" y="237" text-anchor="middle" font-size="10.5" fill="#2d5a2d">DM (UDS over DoIP)</text>

  <!-- ara::ucm (highlighted) -->
  <rect x="560" y="190" width="180" height="70" rx="6" fill="#DFF0D8" stroke="#8FBF8F" stroke-width="1.5"/>
  <text x="650" y="221" text-anchor="middle" font-size="10.5" fill="#2d5a2d">ara::ucm —</text>
  <text x="650" y="237" text-anchor="middle" font-size="10.5" fill="#2d5a2d">UCM updates</text>

  <!-- ara::exec -->
  <rect x="160" y="274" width="180" height="70" rx="6" fill="#DCE9F7" stroke="#7f9dc9" stroke-width="1.5"/>
  <text x="250" y="305" text-anchor="middle" font-size="10.5" fill="#223344">ara::exec —</text>
  <text x="250" y="321" text-anchor="middle" font-size="10.5" fill="#223344">lifecycle</text>

  <!-- ara::per -->
  <rect x="360" y="274" width="180" height="70" rx="6" fill="#DCE9F7" stroke="#7f9dc9" stroke-width="1.5"/>
  <text x="450" y="305" text-anchor="middle" font-size="10.5" fill="#223344">ara::per —</text>
  <text x="450" y="321" text-anchor="middle" font-size="10.5" fill="#223344">persistency</text>

  <!-- ara::log -->
  <rect x="560" y="274" width="180" height="70" rx="6" fill="#DCE9F7" stroke="#7f9dc9" stroke-width="1.5"/>
  <text x="650" y="313" text-anchor="middle" font-size="10.5" fill="#223344">ara::log</text>

  <line x1="460" y1="370" x2="460" y2="382" stroke="#444" stroke-width="2" marker-end="url(#arr)"/>

  <!-- ===================== Row 3: POSIX OS ===================== -->
  <rect x="150" y="384" width="620" height="76" rx="8" fill="#EAF1FB" stroke="#9BBCE0" stroke-width="1.5"/>
  <text x="460" y="416" text-anchor="middle" font-size="13" font-weight="700" fill="#223344">POSIX OS — QNX or Linux</text>
  <text x="460" y="437" text-anchor="middle" font-size="11.5" fill="#223344">apps see the PSE51 profile; platform services may use full POSIX</text>

  <line x1="460" y1="460" x2="460" y2="472" stroke="#444" stroke-width="2" marker-end="url(#arr)"/>

  <!-- ===================== Row 4: High-performance SoC ===================== -->
  <rect x="150" y="474" width="620" height="66" rx="8" fill="#ECECEC" stroke="#B0B0B0" stroke-width="1.5"/>
  <text x="460" y="512" text-anchor="middle" font-size="13" fill="#333">High-performance SoC — Thor-class central computers, domain/zonal HPCs</text>

  <!-- ===================== Right-side dashed callout ===================== -->
  <rect x="775" y="180" width="175" height="200" rx="8" fill="#ffffff" stroke="#2E5FAC" stroke-width="1.5" stroke-dasharray="6,4"/>
  <text x="862" y="236" text-anchor="middle" font-size="10" fill="#2E5FAC">service-oriented: apps</text>
  <text x="862" y="250" text-anchor="middle" font-size="10" fill="#2E5FAC">find services at runtime</text>
  <text x="862" y="264" text-anchor="middle" font-size="10" fill="#2E5FAC">(discovery) —</text>
  <text x="862" y="282" text-anchor="middle" font-size="10" fill="#2E5FAC">but production builds</text>
  <text x="862" y="296" text-anchor="middle" font-size="10" fill="#2E5FAC">pin discovery down and</text>
  <text x="862" y="310" text-anchor="middle" font-size="10" fill="#2E5FAC">restrict dynamic memory</text>
  <text x="862" y="324" text-anchor="middle" font-size="10" fill="#2E5FAC">to startup</text>

  <!-- ===================== Left-side annotation ===================== -->
  <text x="75" y="246" text-anchor="middle" font-size="10.5" font-style="italic" fill="#2E5FAC">middleware ON an OS —</text>
  <text x="75" y="260" text-anchor="middle" font-size="10.5" font-style="italic" fill="#2E5FAC">Adaptive is not itself</text>
  <text x="75" y="274" text-anchor="middle" font-size="10.5" font-style="italic" fill="#2E5FAC">an operating system</text>
  <line x1="75" y1="278" x2="150" y2="300" stroke="#2E5FAC" stroke-width="1" stroke-dasharray="4,3"/>

  <!-- Footnote -->
  <text x="480" y="572" text-anchor="middle" font-size="11" font-style="italic" fill="#555">updates per Software Cluster via UCM (Update and Configuration Management) — not full-ECU reflash ·</text>
  <text x="480" y="588" text-anchor="middle" font-size="11" font-style="italic" fill="#555">safety: ASIL-B shipping, ASIL-D programs underway</text>
</svg>
