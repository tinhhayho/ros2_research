<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 600" width="960" height="600" font-family="Helvetica, Arial, sans-serif">
  <rect x="0" y="0" width="960" height="600" fill="#ffffff"/>

  <defs>
    <marker id="arr" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L9,3 L0,6 z" fill="#444"/>
    </marker>
  </defs>

  <!-- Title -->
  <text x="480" y="40" text-anchor="middle" font-size="26" font-weight="700" fill="#1b2b4a">The automotive software stack — 2026 (DRIVE Thor)</text>

  <!-- ===================== Row 8: Cloud loop (top) ===================== -->
  <rect x="150" y="60" width="620" height="48" rx="8" fill="#DFF0D8" stroke="#8FBF8F" stroke-width="1.5"/>
  <text x="460" y="80" text-anchor="middle" font-size="13.5" fill="#2d5a2d">Cloud loop — DGX (training) · Omniverse + Cosmos (simulation)</text>
  <text x="460" y="98" text-anchor="middle" font-size="12.5" fill="#2d5a2d">OTA updates + fleet data return</text>

  <line x1="460" y1="108" x2="460" y2="120" stroke="#444" stroke-width="2" marker-end="url(#arr)"/>

  <!-- ===================== Row 7: AV app / AUTOSAR Adaptive (side by side) ===================== -->
  <rect x="150" y="122" width="300" height="56" rx="8" fill="#FCE8D5" stroke="#E0A96D" stroke-width="1.5"/>
  <text x="300" y="145" text-anchor="middle" font-size="12.5" fill="#6B4A2B">OEM AV stack — perception · planning</text>
  <text x="300" y="163" text-anchor="middle" font-size="12.5" fill="#6B4A2B">(models distilled from Alpamayo)</text>

  <rect x="470" y="122" width="300" height="56" rx="8" fill="#FCE8D5" stroke="#E0A96D" stroke-width="1.5" stroke-dasharray="6,4"/>
  <text x="620" y="139" text-anchor="middle" font-size="12.5" font-weight="700" fill="#6B4A2B">AUTOSAR Adaptive apps (OEM option)</text>
  <text x="620" y="155" text-anchor="middle" font-size="11.5" fill="#6B4A2B">ara::com — Vector MICROSAR, EB corbos</text>
  <text x="620" y="170" text-anchor="middle" font-size="11" font-style="italic" fill="#6B4A2B">Tier-1 layer — not NVIDIA IP</text>

  <line x1="460" y1="178" x2="460" y2="190" stroke="#444" stroke-width="2" marker-end="url(#arr)"/>

  <!-- ===================== Row 6: DriveWorks ===================== -->
  <rect x="150" y="192" width="620" height="44" rx="8" fill="#DCE9F7" stroke="#7f9dc9" stroke-width="1.5"/>
  <text x="460" y="219" text-anchor="middle" font-size="14" fill="#223344">DriveWorks SDK — sensor abstraction · calibration · egomotion · DNN</text>

  <!-- ===================== Middleware boundary (dashed divider) ===================== -->
  <text x="460" y="256" text-anchor="middle" font-size="12.5" font-style="italic" fill="#2E5FAC">service middleware — NvStreams · SOME/IP · DDS (AUTOSAR AP binding = ROS 2's wire family)</text>
  <line x1="150" y1="263" x2="770" y2="263" stroke="#2E5FAC" stroke-width="2" stroke-dasharray="7,5"/>
  <line x1="460" y1="266" x2="460" y2="278" stroke="#444" stroke-width="2" marker-end="url(#arr)"/>

  <!-- ===================== Row 4: DriveOS 7 ===================== -->
  <rect x="150" y="280" width="620" height="48" rx="8" fill="#EAF1FB" stroke="#9BBCE0" stroke-width="1.5"/>
  <text x="460" y="299" text-anchor="middle" font-size="13.5" fill="#234">DriveOS 7 — Type-1 hypervisor → QNX safety VM (ASIL-D) + Linux AI VM</text>
  <text x="460" y="317" text-anchor="middle" font-size="12.5" fill="#234">CUDA · TensorRT · NvMedia — TÜV SÜD-assessed toolchain</text>

  <line x1="460" y1="328" x2="460" y2="340" stroke="#444" stroke-width="2" marker-end="url(#arr)"/>

  <!-- ===================== Row 3: Thor SoC ===================== -->
  <rect x="150" y="342" width="620" height="40" rx="8" fill="#ECECEC" stroke="#B0B0B0" stroke-width="1.5"/>
  <text x="460" y="367" text-anchor="middle" font-size="14" fill="#333">Thor SoC — Blackwell GPU · Neoverse V3AE · FSI safety island (DRIVE/IGX SKUs)</text>

  <line x1="460" y1="382" x2="460" y2="394" stroke="#444" stroke-width="2" marker-end="url(#arr)"/>

  <!-- ===================== Row 2: In-vehicle network (fieldbus analog) ===================== -->
  <rect x="150" y="396" width="620" height="46" rx="8" fill="#ECECEC" stroke="#B0B0B0" stroke-width="1.5"/>
  <text x="460" y="415" text-anchor="middle" font-size="13.5" fill="#333">In-vehicle network — automotive Ethernet backbone (up to 10 Gbps, TSN)</text>
  <text x="460" y="432" text-anchor="middle" font-size="12.5" fill="#333">CAN-FD · LIN · FlexRay legacy branches — the car's "fieldbus" layer</text>

  <line x1="460" y1="442" x2="460" y2="454" stroke="#444" stroke-width="2" marker-end="url(#arr)"/>

  <!-- ===================== Row 1: Vehicle ECUs (bottom) ===================== -->
  <rect x="150" y="456" width="620" height="62" rx="8" fill="#ECECEC" stroke="#B0B0B0" stroke-width="1.5"/>
  <text x="460" y="476" text-anchor="middle" font-size="13.5" font-weight="700" fill="#333">Vehicle ECUs — zonal/domain MCUs + board safety MCU → AUTOSAR Classic land</text>
  <text x="460" y="493" text-anchor="middle" font-size="11.5" fill="#333">safety MCU: AURIX (Orin gen) → Renesas RH850 (DRIVE Thor), flashed with Vector AUTOSAR firmware ("AFW")</text>
  <text x="460" y="509" text-anchor="middle" font-size="11.5" fill="#333">steer/brake-by-wire · OSEK-heritage RTOS</text>

  <!-- ===================== Right side bracket ===================== -->
  <path d="M 786,396 L 800,396 L 800,518 L 786,518" fill="none" stroke="#2E5FAC" stroke-width="2"/>
  <text x="814" y="457" text-anchor="middle" font-size="12" font-style="italic" fill="#2E5FAC" transform="rotate(-90 814 457)">Classic AUTOSAR</text>
  <text x="834" y="457" text-anchor="middle" font-size="12" font-style="italic" fill="#2E5FAC" transform="rotate(-90 834 457)">MCU + network land</text>

  <!-- Footnote -->
  <text x="480" y="548" text-anchor="middle" font-size="12.5" font-style="italic" fill="#666">Same shape as the robot stack (slide 4) — the in-vehicle network is the car's fieldbus row. NVIDIA ships DriveOS + DriveWorks;</text>
  <text x="480" y="566" text-anchor="middle" font-size="12.5" font-style="italic" fill="#666">AUTOSAR is layered in by Tier-1s — Adaptive beside the AV apps on the SoC, Classic down on the MCUs.</text>

  <!-- Gloss -->
  <text x="480" y="588" text-anchor="middle" font-size="11" fill="#888">TSN = Time-Sensitive Networking (deterministic Ethernet) · LIN/FlexRay = legacy low-cost / pre-Ethernet redundant buses · ECU = electronic control unit</text>

  <!-- Abbreviation key -->
  <text x="480" y="598" text-anchor="middle" font-size="9" fill="#555555">SOME/IP = automotive service middleware &#183; DNN = deep neural network &#183; FSI = functional safety island &#183; AFW = Vector's AUTOSAR firmware for the safety MCU &#183; AP = AUTOSAR Adaptive</text>
</svg>
