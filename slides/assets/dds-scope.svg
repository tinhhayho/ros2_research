<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 600" width="960" height="600" font-family="Helvetica, Arial, sans-serif">
  <rect x="0" y="0" width="960" height="600" fill="#ffffff"/>

  <defs>
    <marker id="arr" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L9,3 L0,6 z" fill="#444"/>
    </marker>
  </defs>

  <!-- Title -->
  <text x="480" y="40" text-anchor="middle" font-size="26" font-weight="700" fill="#1b2b4a">What DDS actually connects — and where it stops</text>

  <!-- ===================== Top row: three green boxes ===================== -->
  <rect x="40" y="64" width="280" height="88" rx="8" fill="#DFF0D8" stroke="#8FBF8F" stroke-width="1.5"/>
  <text x="180" y="92" text-anchor="middle" font-size="13" font-weight="700" fill="#2d5a2d">same process</text>
  <text x="180" y="114" text-anchor="middle" font-size="11" fill="#2d5a2d">node A ↔ node B</text>
  <text x="180" y="132" text-anchor="middle" font-size="11" fill="#2d5a2d">intra-process (opt-in): pointers, DDS bypassed</text>

  <rect x="340" y="64" width="280" height="88" rx="8" fill="#DFF0D8" stroke="#8FBF8F" stroke-width="1.5"/>
  <text x="480" y="92" text-anchor="middle" font-size="13" font-weight="700" fill="#2d5a2d">same machine</text>
  <text x="480" y="114" text-anchor="middle" font-size="11" fill="#2d5a2d">process ↔ process</text>
  <text x="480" y="132" text-anchor="middle" font-size="11" fill="#2d5a2d">shared memory / loopback UDP</text>

  <rect x="640" y="64" width="280" height="88" rx="8" fill="#DFF0D8" stroke="#8FBF8F" stroke-width="1.5"/>
  <text x="780" y="92" text-anchor="middle" font-size="13" font-weight="700" fill="#2d5a2d">across machines</text>
  <text x="780" y="114" text-anchor="middle" font-size="11" fill="#2d5a2d">robot ↔ laptop ↔ robot</text>
  <text x="780" y="132" text-anchor="middle" font-size="11" fill="#2d5a2d">Ethernet — multicast discovery</text>

  <!-- ===================== Location transparency strip ===================== -->
  <rect x="40" y="170" width="880" height="40" rx="8" fill="#DCE9F7" stroke="#7f9dc9" stroke-width="1.5"/>
  <text x="480" y="195" text-anchor="middle" font-size="12.5" fill="#223344">location transparency — identical pub/sub API in all three cases; participants are OS processes with an IP stack</text>

  <!-- ===================== Boundary line ===================== -->
  <text x="64" y="254" text-anchor="start" font-size="11.5" font-weight="700" font-style="italic" fill="#2E5FAC">below this line: no DDS</text>
  <line x1="60" y1="262" x2="900" y2="262" stroke="#2E5FAC" stroke-width="2" stroke-dasharray="7,5"/>

  <!-- ===================== Bottom-left: MCU / fieldbus land ===================== -->
  <rect x="60" y="330" width="420" height="160" rx="8" fill="#FCE8D5" stroke="#E0A96D" stroke-width="1.5"/>
  <text x="270" y="388" text-anchor="middle" font-size="12.5" font-weight="700" fill="#6B4A2B">MCU / fieldbus land — FOC &amp; safety loops</text>
  <text x="270" y="411" text-anchor="middle" font-size="11" fill="#6B4A2B">EtherCAT · CAN-FD: static frames, no IP stack</text>
  <text x="270" y="432" text-anchor="middle" font-size="10.5" fill="#6B4A2B">(cars: zonal/body ECUs — CAN, signal-based Classic AUTOSAR)</text>

  <!-- ===================== Bottom-right: the bridge ===================== -->
  <rect x="500" y="330" width="420" height="160" rx="8" fill="#EAF1FB" stroke="#9BBCE0" stroke-width="1.5"/>
  <text x="710" y="372" text-anchor="middle" font-size="12.5" font-weight="700" fill="#223344">the bridge: micro-ROS</text>
  <text x="710" y="393" text-anchor="middle" font-size="10.5" fill="#223344">rclc + XRCE-DDS client — a LIBRARY linked into</text>
  <text x="710" y="410" text-anchor="middle" font-size="10.5" fill="#223344">your firmware, a task on YOUR RTOS</text>
  <text x="710" y="428" text-anchor="middle" font-size="10.5" fill="#223344">talks XRCE (not DDS) to an Agent on the big computer</text>
  <text x="710" y="446" text-anchor="middle" font-size="10.5" fill="#223344">the Agent joins the graph on the MCU's behalf</text>

  <!-- Agent arrow across the boundary -->
  <line x1="710" y1="330" x2="710" y2="212" stroke="#444" stroke-width="2" marker-end="url(#arr)"/>
  <text x="720" y="278" text-anchor="start" font-size="11" fill="#223344">Agent</text>

  <!-- Footnote -->
  <text x="480" y="556" text-anchor="middle" font-size="11" font-style="italic" fill="#555">automotive mirror: on Thor the same role is played by in-guest middleware (NvStreams · ara::com — SOME/IP or DDS binding);</text>
  <text x="480" y="574" text-anchor="middle" font-size="11" font-style="italic" fill="#555">the DDS wire family is what AUTOSAR Adaptive shares with ROS 2 (binding since R18-03)</text>
  <text x="480" y="591" text-anchor="middle" font-size="9.5" fill="#555555">DDS = data distribution service (ROS 2's pub/sub middleware) &#183; XRCE-DDS = DDS for extremely resource-constrained environments (micro-ROS) &#183; SOME/IP = automotive service middleware</text>
</svg>
