<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 600" width="960" height="600" font-family="'Segoe UI','Helvetica Neue',Arial,sans-serif">
  <rect x="0" y="0" width="960" height="600" fill="#ffffff"/>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L9,3 L0,6 z" fill="#444"/>
    </marker>
  </defs>

  <!-- Title -->
  <text x="480" y="44" text-anchor="middle" font-size="26" font-weight="700" fill="#1b2b4a">What you'll see: turtlesim live</text>
  <text x="480" y="68" text-anchor="middle" font-size="13" font-style="italic" fill="#666">Live node graph (rqt_graph view) of the running demo</text>

  <!-- Background panels -->
  <rect x="36" y="82" width="586" height="450" rx="12" fill="#FAFBFD" stroke="#E8EBF0" stroke-width="1.5"/>
  <rect x="640" y="118" width="296" height="346" rx="12" fill="#FAFBFD" stroke="#E8EBF0" stroke-width="1.5"/>

  <!-- ===== Service callouts ===== -->
  <text x="457" y="93" text-anchor="middle" font-size="13" font-style="italic" fill="#666">services (request / reply)</text>
  <!-- connector lines to /turtlesim -->
  <line x1="378" y1="130" x2="427" y2="181" stroke="#B0B0B0" stroke-width="1.3"/>
  <line x1="449" y1="130" x2="450" y2="178" stroke="#B0B0B0" stroke-width="1.3"/>
  <line x1="528" y1="130" x2="476" y2="183" stroke="#B0B0B0" stroke-width="1.3"/>
  <!-- service tags -->
  <rect x="345" y="100" width="66" height="30" rx="8" fill="#FCE8D5" stroke="#E0A96D" stroke-width="1.5"/>
  <text x="378" y="120" text-anchor="middle" font-size="14" fill="#6B4A2B">/spawn</text>
  <rect x="419" y="100" width="60" height="30" rx="8" fill="#FCE8D5" stroke="#E0A96D" stroke-width="1.5"/>
  <text x="449" y="120" text-anchor="middle" font-size="14" fill="#6B4A2B">/clear</text>
  <rect x="487" y="100" width="82" height="30" rx="8" fill="#FCE8D5" stroke="#E0A96D" stroke-width="1.5"/>
  <text x="528" y="120" text-anchor="middle" font-size="14" fill="#6B4A2B">/set_pen</text>

  <!-- ===== Nodes ===== -->
  <!-- /teleop_turtle -->
  <ellipse cx="130" cy="220" rx="82" ry="38" fill="#DCE9F7" stroke="#6F9BD1" stroke-width="2"/>
  <text x="130" y="225" text-anchor="middle" font-size="16" fill="#234">/teleop_turtle</text>

  <!-- /turtlesim -->
  <ellipse cx="450" cy="220" rx="84" ry="42" fill="#DCE9F7" stroke="#6F9BD1" stroke-width="2"/>
  <text x="450" y="226" text-anchor="middle" font-size="17" font-weight="600" fill="#234">/turtlesim</text>

  <!-- cmd_vel topic arrow -->
  <line x1="212" y1="220" x2="362" y2="220" stroke="#444" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="287" y="200" text-anchor="middle" font-size="14" fill="#234">/turtle1/cmd_vel</text>
  <text x="287" y="215" text-anchor="middle" font-size="12" font-style="italic" fill="#666">(geometry_msgs/Twist)</text>

  <!-- pose topic arrow -->
  <line x1="450" y1="263" x2="450" y2="426" stroke="#444" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="466" y="338" text-anchor="start" font-size="14" fill="#234">/turtle1/pose</text>
  <text x="466" y="354" text-anchor="start" font-size="12" font-style="italic" fill="#666">(turtlesim/Pose)</text>

  <!-- echo / plot box -->
  <rect x="370" y="430" width="160" height="54" rx="8" fill="#ECECEC" stroke="#B0B0B0" stroke-width="1.5"/>
  <text x="450" y="463" text-anchor="middle" font-size="16" fill="#333">(echo / plot)</text>
  <text x="450" y="508" text-anchor="middle" font-size="12" font-style="italic" fill="#666">subscriber: ros2 topic echo / rqt_plot</text>

  <!-- ===== render link to window ===== -->
  <line x1="536" y1="210" x2="648" y2="210" stroke="#9BBCE0" stroke-width="1.5" stroke-dasharray="5 4"/>
  <text x="592" y="226" text-anchor="middle" font-size="12" font-style="italic" fill="#666">renders the window</text>

  <!-- ===== Turtle window ===== -->
  <text x="788" y="140" text-anchor="middle" font-size="14" fill="#234">turtlesim window</text>
  <rect x="652" y="150" width="272" height="272" rx="8" fill="#EAF1FB" stroke="#6F9BD1" stroke-width="2"/>

  <!-- curved pen trail -->
  <path d="M 688 392 C 720 320, 760 380, 770 320 S 820 250, 838 268" fill="none" stroke="#2E5FAC" stroke-width="2.5" stroke-linecap="round"/>

  <!-- turtle -->
  <g stroke="#558B2F" stroke-width="1.5">
    <circle cx="838" cy="246" r="8" fill="#7CB342"/>
    <circle cx="817" cy="256" r="6" fill="#7CB342"/>
    <circle cx="859" cy="256" r="6" fill="#7CB342"/>
    <circle cx="817" cy="287" r="6" fill="#7CB342"/>
    <circle cx="859" cy="287" r="6" fill="#7CB342"/>
    <ellipse cx="838" cy="271" rx="24" ry="20" fill="#7CB342"/>
    <line x1="838" y1="251" x2="838" y2="291" stroke="#558B2F" stroke-width="1.2"/>
    <line x1="814" y1="271" x2="862" y2="271" stroke="#558B2F" stroke-width="1.2"/>
    <path d="M833,289 L843,289 L838,300 z" fill="#7CB342"/>
  </g>

  <text x="788" y="442" text-anchor="middle" font-size="13" font-style="italic" fill="#666">drive it with the arrow keys</text>

  <!-- Bottom caption -->
  <text x="480" y="568" text-anchor="middle" font-size="13" fill="#444">Press arrow keys &#8594; Twist on /turtle1/cmd_vel &#8594; turtle moves &#8594; Pose streams back. Topics + services, visible.</text>
</svg>