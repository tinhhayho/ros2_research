<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 600" width="960" height="600" font-family="Helvetica, Arial, sans-serif">
  <rect x="0" y="0" width="960" height="600" fill="#ffffff"/>

  <!-- Title -->
<text x="480" y="42" text-anchor="middle" font-size="26" font-weight="700" fill="#1b2b4a">Who does what &#8212; task placement by layer</text>

  <!-- Band: Autonomy -->
<rect x="40" y="68.0" width="760" height="78.0" rx="8" fill="#FCE8D5" stroke="#E0A96D" stroke-width="1.5"/>
<text x="54" y="97.0" font-size="15" font-weight="700" fill="#6B4A2B">Autonomy</text>
<rect x="171.7" y="81.0" width="230.3" height="22" rx="6" fill="#FFFFFF" stroke="#E0A96D" stroke-width="1.2"/>
<text x="286.8" y="96.5" text-anchor="middle" font-size="13" fill="#333">global path — Nav2 planner · ~1 Hz</text>
<rect x="412.0" y="81.0" width="226.3" height="22" rx="6" fill="#FFFFFF" stroke="#E0A96D" stroke-width="1.2"/>
<text x="525.1" y="96.5" text-anchor="middle" font-size="13" fill="#333">local controller — MPPI · 20–50 Hz</text>
<rect x="54.0" y="111.0" width="241.5" height="22" rx="6" fill="#FFFFFF" stroke="#E0A96D" stroke-width="1.2"/>
<text x="174.7" y="126.5" text-anchor="middle" font-size="13" fill="#333">RL / VLA policy — GR00T · 10–50 Hz</text>
  <!-- Band: ROS 2 graph (Linux, non-RT) -->
<rect x="40" y="156.0" width="760" height="78.0" rx="8" fill="#DCE9F7" stroke="#7f9dc9" stroke-width="1.5"/>
<text x="54" y="185.0" font-size="15" font-weight="700" fill="#223344">ROS 2 graph (Linux, non-RT)</text>
<rect x="323.2" y="169.0" width="224.8" height="22" rx="6" fill="#FFFFFF" stroke="#7f9dc9" stroke-width="1.2"/>
<text x="435.6" y="184.5" text-anchor="middle" font-size="13" fill="#333">LiDAR / camera drivers · 10–30 Hz</text>
<rect x="558.0" y="169.0" width="203.9" height="22" rx="6" fill="#FFFFFF" stroke="#7f9dc9" stroke-width="1.2"/>
<text x="660.0" y="184.5" text-anchor="middle" font-size="13" fill="#333">EKF sensor fusion · 50–200 Hz</text>
<rect x="54.0" y="199.0" width="215.5" height="22" rx="6" fill="#FFFFFF" stroke="#7f9dc9" stroke-width="1.2"/>
<text x="161.7" y="214.5" text-anchor="middle" font-size="13" fill="#333">SLAM — slam_toolbox · 5–30 Hz</text>
<rect x="279.5" y="199.0" width="255.2" height="22" rx="6" fill="#FFFFFF" stroke="#7f9dc9" stroke-width="1.2"/>
<text x="407.1" y="214.5" text-anchor="middle" font-size="13" fill="#333">planning FK/IK — MoveIt 2 · on demand</text>
<text x="420.0" y="256.0" text-anchor="middle" font-size="13" font-style="italic" fill="#2E5FAC">ROS 2 boundary</text>
<line x1="40" y1="264.0" x2="800" y2="264.0" stroke="#2E5FAC" stroke-width="2" stroke-dasharray="7,5"/>
  <!-- Band: RT control — ros2_control (PREEMPT_RT) -->
<rect x="40" y="274.0" width="760" height="78.0" rx="8" fill="#EAF1FB" stroke="#9BBCE0" stroke-width="1.5"/>
<text x="54" y="303.0" font-size="15" font-weight="700" fill="#1d3f66">RT control — ros2_control (PREEMPT_RT)</text>
<rect x="434.3" y="287.0" width="176.1" height="22" rx="6" fill="#FFFFFF" stroke="#9BBCE0" stroke-width="1.2"/>
<text x="522.3" y="302.5" text-anchor="middle" font-size="13" fill="#333">joint position loop · ~1 kHz</text>
<rect x="54.0" y="317.0" width="282.6" height="22" rx="6" fill="#FFFFFF" stroke="#9BBCE0" stroke-width="1.2"/>
<text x="195.3" y="332.5" text-anchor="middle" font-size="13" fill="#333">control-mode FK/IK — QP, Pinocchio · 1 kHz</text>
  <!-- Band: Fieldbus -->
<rect x="40" y="362.0" width="760" height="42.0" rx="8" fill="#ECECEC" stroke="#B0B0B0" stroke-width="1.5"/>
<text x="54" y="388.0" font-size="15" font-weight="700" fill="#333">Fieldbus</text>
<rect x="158.9" y="372.0" width="410.5" height="22" rx="6" fill="#FFFFFF" stroke="#B0B0B0" stroke-width="1.2"/>
<text x="364.1" y="387.5" text-anchor="middle" font-size="13" fill="#333">EtherCAT PDO / CAN-FD — state up, setpoints down · 1 kHz cycle</text>
  <!-- Band: MCU firmware -->
<rect x="40" y="414.0" width="760" height="78.0" rx="8" fill="#ECECEC" stroke="#B0B0B0" stroke-width="1.5"/>
<text x="54" y="443.0" font-size="15" font-weight="700" fill="#333">MCU firmware</text>
<rect x="205.1" y="427.0" width="189.5" height="22" rx="6" fill="#FFFFFF" stroke="#B0B0B0" stroke-width="1.2"/>
<text x="299.8" y="442.5" text-anchor="middle" font-size="13" fill="#333">FOC current loop · 8–32 kHz</text>
<rect x="404.5" y="427.0" width="209.0" height="22" rx="6" fill="#FFFFFF" stroke="#B0B0B0" stroke-width="1.2"/>
<text x="509.0" y="442.5" text-anchor="middle" font-size="13" fill="#333">velocity / torque loop · 1–10 kHz</text>
<rect x="54.0" y="457.0" width="163.8" height="22" rx="6" fill="#FFFFFF" stroke="#B0B0B0" stroke-width="1.2"/>
<text x="135.9" y="472.5" text-anchor="middle" font-size="13" fill="#333">raw encoder + IMU read</text>
<rect x="227.8" y="457.0" width="136.0" height="22" rx="6" fill="#FFFFFF" stroke="#B0B0B0" stroke-width="1.2"/>
<text x="295.8" y="472.5" text-anchor="middle" font-size="13" fill="#333">E-stop / safety path</text>

  <!-- Speed / latency annotation -->
<polygon points="838,86.0 852,86.0 845,74.0" fill="#2E5FAC"/>
<rect x="842" y="86.0" width="6" height="388.0" fill="#2E5FAC"/>
<polygon points="838,474.0 852,474.0 845,486.0" fill="#2E5FAC"/>
<text x="845.0" y="64.0" text-anchor="middle" font-size="13" font-weight="700" fill="#2E5FAC">1 Hz</text>
<text x="845.0" y="508.0" text-anchor="middle" font-size="13" font-weight="700" fill="#2E5FAC">32 kHz</text>
<text x="869.0" y="177.0" text-anchor="middle" font-size="12" font-style="italic" fill="#2E5FAC" transform="rotate(-90 869.0 177.0)">smarter &#183; latency-tolerant</text>
<text x="869.0" y="383.0" text-anchor="middle" font-size="12" font-style="italic" fill="#2E5FAC" transform="rotate(-90 869.0 383.0)">faster &#183; deterministic</text>

  <!-- Footnote -->
<text x="480" y="578" text-anchor="middle" font-size="13" font-style="italic" fill="#555">The loop rate picks the layer &#8212; misplace a task and you get either jitter or wasted silicon.</text>
</svg>
