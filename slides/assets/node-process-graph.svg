<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 600" width="960" height="600" font-family="Helvetica, Arial, sans-serif">
  <rect x="0" y="0" width="960" height="600" fill="#ffffff"/>

  <defs>
    <marker id="arr" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L9,3 L0,6 z" fill="#444"/>
    </marker>
    <marker id="arrs" markerWidth="10" markerHeight="10" refX="1" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M9,0 L0,3 L9,6 z" fill="#444"/>
    </marker>
  </defs>

  <!-- Title -->
  <text x="480" y="40" text-anchor="middle" font-size="26" font-weight="700" fill="#1b2b4a">A node is a name, not a thread — processes, executors, nodes</text>

  <!-- ===================== OS process A ===================== -->
  <rect x="60" y="70" width="430" height="310" rx="8" fill="#EAF1FB" stroke="#9BBCE0" stroke-width="1.5"/>
  <text x="275" y="92" text-anchor="middle" font-size="13" font-weight="700" fill="#223344">OS process A (one program)</text>

  <rect x="75" y="102" width="400" height="30" rx="8" fill="#DCE9F7" stroke="#7f9dc9" stroke-width="1.5"/>
  <text x="275" y="121" text-anchor="middle" font-size="11" fill="#223344">Executor — event loop, owns 1..N callback threads</text>

  <rect x="75" y="146" width="190" height="92" rx="8" fill="#FCE8D5" stroke="#E0A96D" stroke-width="1.5"/>
  <text x="170" y="172" text-anchor="middle" font-size="12" font-weight="700" fill="#6B4A2B">Node /camera</text>
  <text x="170" y="192" text-anchor="middle" font-size="10.5" fill="#6B4A2B">pub /image</text>
  <text x="170" y="208" text-anchor="middle" font-size="10.5" fill="#6B4A2B">timer 30 Hz</text>

  <rect x="285" y="146" width="190" height="92" rx="8" fill="#FCE8D5" stroke="#E0A96D" stroke-width="1.5"/>
  <text x="380" y="172" text-anchor="middle" font-size="12" font-weight="700" fill="#6B4A2B">Node /detect</text>
  <text x="380" y="192" text-anchor="middle" font-size="10.5" fill="#6B4A2B">sub /image</text>
  <text x="380" y="208" text-anchor="middle" font-size="10.5" fill="#6B4A2B">pub /obstacles</text>

  <rect x="139" y="250" width="272" height="28" rx="8" fill="#DFF0D8" stroke="#8FBF8F" stroke-width="1.5"/>
  <text x="275" y="268" text-anchor="middle" font-size="10.5" fill="#2d5a2d">intra-process (opt-in) — pointer pass, no serialization</text>

  <rect x="75" y="334" width="400" height="30" rx="8" fill="#ECECEC" stroke="#B0B0B0" stroke-width="1.5"/>
  <text x="275" y="353" text-anchor="middle" font-size="10.5" fill="#333">DDS threads — network I/O</text>

  <!-- ===================== OS process B ===================== -->
  <rect x="600" y="70" width="300" height="310" rx="8" fill="#EAF1FB" stroke="#9BBCE0" stroke-width="1.5"/>
  <text x="750" y="92" text-anchor="middle" font-size="13" font-weight="700" fill="#223344">OS process B</text>

  <rect x="615" y="102" width="270" height="30" rx="8" fill="#DCE9F7" stroke="#7f9dc9" stroke-width="1.5"/>
  <text x="750" y="121" text-anchor="middle" font-size="11" fill="#223344">Executor — event loop, owns 1..N callback threads</text>

  <rect x="655" y="146" width="190" height="92" rx="8" fill="#FCE8D5" stroke="#E0A96D" stroke-width="1.5"/>
  <text x="750" y="172" text-anchor="middle" font-size="12" font-weight="700" fill="#6B4A2B">Node /planner</text>
  <text x="750" y="192" text-anchor="middle" font-size="10.5" fill="#6B4A2B">sub /obstacles</text>
  <text x="750" y="208" text-anchor="middle" font-size="10.5" fill="#6B4A2B">pub /cmd_vel</text>

  <rect x="615" y="334" width="270" height="30" rx="8" fill="#ECECEC" stroke="#B0B0B0" stroke-width="1.5"/>
  <text x="750" y="353" text-anchor="middle" font-size="10.5" fill="#333">DDS threads — network I/O</text>

  <!-- ===================== DDS bus ===================== -->
  <line x1="275" y1="380" x2="275" y2="412" stroke="#444" stroke-width="2" marker-start="url(#arrs)" marker-end="url(#arr)"/>
  <line x1="750" y1="380" x2="750" y2="412" stroke="#444" stroke-width="2" marker-start="url(#arrs)" marker-end="url(#arr)"/>
  <line x1="170" y1="412" x2="790" y2="412" stroke="#444" stroke-width="2"/>
  <text x="480" y="432" text-anchor="middle" font-size="11.5" fill="#223344">DDS — discovery + topics (/obstacles)</text>

  <!-- ===================== Statements strip ===================== -->
  <rect x="60" y="448" width="840" height="40" rx="8" fill="#EAF1FB" stroke="#9BBCE0" stroke-width="1.5"/>
  <text x="480" y="472" text-anchor="middle" font-size="11.5" fill="#223344">1 process = 1 node — the classic layout · 1 process = N nodes — composition · threads belong to the EXECUTOR, not the node</text>

  <!-- Footnote -->
  <text x="480" y="556" text-anchor="middle" font-size="11" font-style="italic" fill="#555">callback model: the executor runs each callback to completion — no priority preemption between callbacks (unlike RTOS tasks);</text>
  <text x="480" y="574" text-anchor="middle" font-size="11" font-style="italic" fill="#555">hard-RT loops live outside the graph (ros2_control)</text>
  <text x="480" y="591" text-anchor="middle" font-size="9.5" fill="#555555">DDS = data distribution service &#8212; the pub/sub middleware under ROS 2</text>
</svg>
