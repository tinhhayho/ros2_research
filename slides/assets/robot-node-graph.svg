<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 600" width="960" height="600" font-family="Helvetica, Arial, sans-serif">
  <rect x="0" y="0" width="960" height="600" fill="#ffffff"/>

  <defs>
    <marker id="arrG" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L9,3 L0,6 z" fill="#1E7D32"/>
    </marker>
    <marker id="arrGl" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L9,3 L0,6 z" fill="#1E7D32" opacity="0.55"/>
    </marker>
  </defs>

  <!-- Title -->
  <text x="480" y="40" text-anchor="middle" font-size="26" font-weight="700" fill="#1b2b4a">A real robot's graph — the wheeled-AMR stack as rqt_graph would draw it</text>

  <!-- Legend (same color language as the fleet-to-joint figure) -->
  <rect x="26" y="56" width="908" height="26" rx="8" fill="#ffffff" stroke="#B0B0B0" stroke-width="1"/>
  <rect x="38" y="62" width="20" height="14" rx="4" fill="#EAF1FB" stroke="#6F9BD1" stroke-width="1.4"/>
  <text x="64" y="73" font-size="9.5" fill="#333">ROS 2 node</text>
  <rect x="136" y="62" width="20" height="14" rx="4" fill="#F7FAFF" stroke="#9BBCE0" stroke-width="1.4" stroke-dasharray="4 3"/>
  <text x="162" y="73" font-size="9.5" fill="#333">family of nodes</text>
  <line x1="252" y1="69" x2="284" y2="69" stroke="#1E7D32" stroke-width="2" marker-end="url(#arrG)"/>
  <text x="292" y="73" font-size="9.5" fill="#333">topic (label = its name)</text>
  <line x1="420" y1="65" x2="452" y2="65" stroke="#1E7D32" stroke-width="1.5"/>
  <line x1="420" y1="72" x2="452" y2="72" stroke="#1E7D32" stroke-width="1.5"/>
  <path d="M452,62 L462,68.5 L452,75 z" fill="#1E7D32"/>
  <text x="470" y="73" font-size="9.5" fill="#333">action (goal+feedback+result)</text>
  <line x1="642" y1="69" x2="676" y2="69" stroke="#C0392B" stroke-width="2" stroke-dasharray="7 5"/>
  <text x="684" y="73" font-size="9.5" fill="#333">RT boundary</text>
  <rect x="762" y="62" width="20" height="14" rx="4" fill="#E4E4E4" stroke="#8A8A8A" stroke-width="1.4"/>
  <text x="788" y="73" font-size="9.5" fill="#333">fieldbus + MCU firmware</text>

  <!-- ===================== Driver nodes (left) ===================== -->
  <rect x="50" y="140" width="120" height="34" rx="8" fill="#EAF1FB" stroke="#6F9BD1" stroke-width="1.5"/>
  <text x="110" y="161" text-anchor="middle" font-size="12" font-weight="700" fill="#234">/lidar_driver</text>

  <rect x="50" y="260" width="120" height="34" rx="8" fill="#EAF1FB" stroke="#6F9BD1" stroke-width="1.5"/>
  <text x="110" y="281" text-anchor="middle" font-size="12" font-weight="700" fill="#234">/imu_driver</text>

  <!-- ===================== Localization nodes (middle-left) ===================== -->
  <rect x="240" y="120" width="130" height="34" rx="8" fill="#EAF1FB" stroke="#6F9BD1" stroke-width="1.5"/>
  <text x="305" y="141" text-anchor="middle" font-size="12" font-weight="700" fill="#234">/slam_toolbox</text>

  <rect x="240" y="190" width="130" height="34" rx="8" fill="#EAF1FB" stroke="#6F9BD1" stroke-width="1.5"/>
  <text x="305" y="211" text-anchor="middle" font-size="12" font-weight="700" fill="#234">/amcl</text>

  <rect x="240" y="290" width="130" height="34" rx="8" fill="#EAF1FB" stroke="#6F9BD1" stroke-width="1.5"/>
  <text x="305" y="311" text-anchor="middle" font-size="12" font-weight="700" fill="#234">/ekf</text>

  <!-- ===================== Topic arrows: drivers -> localization ===================== -->
  <line x1="170" y1="157" x2="240" y2="137" stroke="#1E7D32" stroke-width="1.7" marker-end="url(#arrG)"/>
  <line x1="170" y1="157" x2="240" y2="207" stroke="#1E7D32" stroke-width="1.7" marker-end="url(#arrG)"/>
  <text x="205" y="165" text-anchor="middle" font-size="10.5" fill="#1E7D32">/scan</text>

  <line x1="170" y1="277" x2="240" y2="307" stroke="#1E7D32" stroke-width="1.7" marker-end="url(#arrG)"/>
  <text x="200" y="278" text-anchor="middle" font-size="10.5" fill="#1E7D32">/imu</text>

  <!-- ===================== Nav2 group (a family of nodes) ===================== -->
  <rect x="430" y="150" width="230" height="210" rx="8" fill="#F7FAFF" stroke="#9BBCE0" stroke-width="1.5" stroke-dasharray="6 4"/>
  <text x="445" y="168" text-anchor="start" font-size="13" font-weight="700" fill="#234">Nav2 — a family of nodes</text>

  <rect x="450" y="176" width="190" height="32" rx="8" fill="#EAF1FB" stroke="#6F9BD1" stroke-width="1.5"/>
  <text x="545" y="196" text-anchor="middle" font-size="12" font-weight="700" fill="#234">/bt_navigator</text>

  <rect x="450" y="232" width="190" height="32" rx="8" fill="#EAF1FB" stroke="#6F9BD1" stroke-width="1.5"/>
  <text x="545" y="252" text-anchor="middle" font-size="12" font-weight="700" fill="#234">/planner_server</text>

  <rect x="450" y="288" width="190" height="32" rx="8" fill="#EAF1FB" stroke="#6F9BD1" stroke-width="1.5"/>
  <text x="545" y="308" text-anchor="middle" font-size="12" font-weight="700" fill="#234">/controller_server</text>

  <line x1="545" y1="208" x2="545" y2="230" stroke="#1E7D32" stroke-width="1.2" opacity="0.55" marker-end="url(#arrGl)"/>
  <line x1="545" y1="264" x2="545" y2="286" stroke="#1E7D32" stroke-width="1.2" opacity="0.55" marker-end="url(#arrGl)"/>

  <!-- ===================== Topic arrows into Nav2 ===================== -->
  <line x1="370" y1="137" x2="430" y2="165" stroke="#1E7D32" stroke-width="1.7" marker-end="url(#arrG)"/>
  <text x="400" y="138" text-anchor="middle" font-size="10.5" fill="#1E7D32">/map</text>

  <line x1="370" y1="207" x2="430" y2="220" stroke="#1E7D32" stroke-width="1.7" marker-end="url(#arrG)"/>
  <text x="400" y="198" text-anchor="middle" font-size="10.5" fill="#1E7D32">/amcl_pose</text>

  <line x1="370" y1="307" x2="430" y2="300" stroke="#1E7D32" stroke-width="1.7" marker-end="url(#arrG)"/>
  <text x="424" y="338" text-anchor="end" font-size="10.5" fill="#1E7D32">/odometry/filtered</text>

  <!-- ===================== Fleet adapter + action arrow ===================== -->
  <rect x="720" y="96" width="200" height="38" rx="8" fill="#EAF1FB" stroke="#6F9BD1" stroke-width="1.5"/>
  <text x="820" y="119" text-anchor="middle" font-size="12" font-weight="700" fill="#234">/fleet_adapter (Open-RMF)</text>

  <path d="M816,134 L816,188 L652,188" fill="none" stroke="#1E7D32" stroke-width="1.5"/>
  <path d="M824,134 L824,196 L652,196" fill="none" stroke="#1E7D32" stroke-width="1.5"/>
  <path d="M644,192 L656,185 L656,199 z" fill="#1E7D32"/>
  <text x="735" y="180" text-anchor="middle" font-size="10.5" fill="#1E7D32">/navigate_to_pose (action)</text>

  <!-- ===================== controller_manager + cmd_vel + odom ===================== -->
  <rect x="425" y="400" width="240" height="36" rx="8" fill="#EAF1FB" stroke="#6F9BD1" stroke-width="1.5"/>
  <text x="545" y="422" text-anchor="middle" font-size="12" font-weight="700" fill="#234">/controller_manager (ros2_control)</text>

  <line x1="545" y1="360" x2="545" y2="398" stroke="#1E7D32" stroke-width="1.7" marker-end="url(#arrG)"/>
  <text x="555" y="384" text-anchor="start" font-size="10.5" fill="#1E7D32">/cmd_vel</text>

  <path d="M425,418 L305,418 L305,326" fill="none" stroke="#1E7D32" stroke-width="1.7" marker-end="url(#arrG)"/>
  <text x="360" y="432" text-anchor="middle" font-size="10.5" fill="#1E7D32">/odom (wheel odometry)</text>

  <!-- ===================== RT boundary ===================== -->
  <text x="480" y="462" text-anchor="middle" font-size="11" font-style="italic" fill="#C0392B">the graph ends here — below: the 1 kHz RT loop (function calls, no topics)</text>
  <line x1="60" y1="470" x2="900" y2="470" stroke="#C0392B" stroke-width="2" stroke-dasharray="7,5"/>

  <rect x="60" y="482" width="840" height="32" rx="8" fill="#E4E4E4" stroke="#8A8A8A" stroke-width="1.5"/>
  <text x="480" y="502" text-anchor="middle" font-size="11.5" fill="#333">motors · encoders — EtherCAT / CAN-FD → MCU firmware (FOC)</text>

  <!-- Footnote -->
  <text x="480" y="575" text-anchor="middle" font-size="11" font-style="italic" fill="#555">node/topic names from the real wheeled-AMR stack (ros2_control · EKF · slam_toolbox + AMCL · Nav2/MPPI); our own captured mini-graph: docs/img/demo1_node_list.txt</text>

  <!-- Abbreviation key -->
  <text x="480" y="592" text-anchor="middle" font-size="10" fill="#555555">AMR = autonomous mobile robot &#183; EKF = extended Kalman filter &#183; AMCL = adaptive Monte-Carlo localization &#183; MPPI = Nav2's sampling-based controller</text>
</svg>
