<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 600" width="960" height="600" font-family="Helvetica, Arial, sans-serif">
  <rect x="0" y="0" width="960" height="600" fill="#ffffff"/>

  <defs>
    <marker id="arr" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L9,3 L0,6 z" fill="#444"/>
    </marker>
    <marker id="arrg" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L9,3 L0,6 z" fill="#999"/>
    </marker>
  </defs>

  <!-- Title -->
  <text x="480" y="40" text-anchor="middle" font-size="26" font-weight="700" fill="#1b2b4a">A real robot's graph — the wheeled-AMR stack as rqt_graph would draw it</text>

  <!-- Legend -->
  <rect x="40" y="56" width="500" height="24" rx="8" fill="#ffffff" stroke="#B0B0B0" stroke-width="1"/>
  <text x="290" y="72" text-anchor="middle" font-size="10.5" fill="#333">→ topic (pub/sub) · ⇒ action (goal + feedback + result) · every box = one node, discovered by name</text>

  <!-- ===================== Driver nodes (left, orange) ===================== -->
  <rect x="50" y="140" width="120" height="34" rx="8" fill="#FCE8D5" stroke="#E0A96D" stroke-width="1.5"/>
  <text x="110" y="161" text-anchor="middle" font-size="12" font-weight="700" fill="#6B4A2B">/lidar_driver</text>

  <rect x="50" y="260" width="120" height="34" rx="8" fill="#FCE8D5" stroke="#E0A96D" stroke-width="1.5"/>
  <text x="110" y="281" text-anchor="middle" font-size="12" font-weight="700" fill="#6B4A2B">/imu_driver</text>

  <!-- ===================== Localization nodes (middle-left, blue) ===================== -->
  <rect x="240" y="120" width="130" height="34" rx="8" fill="#DCE9F7" stroke="#7f9dc9" stroke-width="1.5"/>
  <text x="305" y="141" text-anchor="middle" font-size="12" font-weight="700" fill="#223344">/slam_toolbox</text>

  <rect x="240" y="190" width="130" height="34" rx="8" fill="#DCE9F7" stroke="#7f9dc9" stroke-width="1.5"/>
  <text x="305" y="211" text-anchor="middle" font-size="12" font-weight="700" fill="#223344">/amcl</text>

  <rect x="240" y="290" width="130" height="34" rx="8" fill="#DCE9F7" stroke="#7f9dc9" stroke-width="1.5"/>
  <text x="305" y="311" text-anchor="middle" font-size="12" font-weight="700" fill="#223344">/ekf</text>

  <!-- ===================== Topic arrows: drivers -> localization ===================== -->
  <line x1="170" y1="157" x2="240" y2="137" stroke="#444" stroke-width="1.5" marker-end="url(#arr)"/>
  <line x1="170" y1="157" x2="240" y2="207" stroke="#444" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="205" y="165" text-anchor="middle" font-size="10.5" fill="#223344">/scan</text>

  <line x1="170" y1="277" x2="240" y2="307" stroke="#444" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="200" y="278" text-anchor="middle" font-size="10.5" fill="#223344">/imu</text>

  <!-- ===================== Nav2 group ===================== -->
  <rect x="430" y="150" width="230" height="210" rx="8" fill="#EAF1FB" stroke="#9BBCE0" stroke-width="1.5"/>
  <text x="445" y="168" text-anchor="start" font-size="13" font-weight="700" fill="#223344">Nav2</text>

  <rect x="450" y="176" width="190" height="32" rx="8" fill="#DCE9F7" stroke="#7f9dc9" stroke-width="1.5"/>
  <text x="545" y="196" text-anchor="middle" font-size="12" font-weight="700" fill="#223344">/bt_navigator</text>

  <rect x="450" y="232" width="190" height="32" rx="8" fill="#DCE9F7" stroke="#7f9dc9" stroke-width="1.5"/>
  <text x="545" y="252" text-anchor="middle" font-size="12" font-weight="700" fill="#223344">/planner_server</text>

  <rect x="450" y="288" width="190" height="32" rx="8" fill="#DCE9F7" stroke="#7f9dc9" stroke-width="1.5"/>
  <text x="545" y="308" text-anchor="middle" font-size="12" font-weight="700" fill="#223344">/controller_server</text>

  <line x1="545" y1="208" x2="545" y2="230" stroke="#999" stroke-width="1.2" marker-end="url(#arrg)"/>
  <line x1="545" y1="264" x2="545" y2="286" stroke="#999" stroke-width="1.2" marker-end="url(#arrg)"/>

  <!-- ===================== Topic arrows into Nav2 ===================== -->
  <line x1="370" y1="137" x2="430" y2="165" stroke="#444" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="400" y="138" text-anchor="middle" font-size="10.5" fill="#223344">/map</text>

  <line x1="370" y1="207" x2="430" y2="220" stroke="#444" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="400" y="198" text-anchor="middle" font-size="10.5" fill="#223344">/amcl_pose</text>

  <line x1="370" y1="307" x2="430" y2="300" stroke="#444" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="424" y="338" text-anchor="end" font-size="10.5" fill="#223344">/odometry/filtered</text>

  <!-- ===================== Fleet adapter + action arrow ===================== -->
  <rect x="720" y="96" width="200" height="38" rx="8" fill="#DFF0D8" stroke="#8FBF8F" stroke-width="1.5"/>
  <text x="820" y="119" text-anchor="middle" font-size="12" font-weight="700" fill="#2d5a2d">/fleet_adapter (Open-RMF)</text>

  <path d="M816,134 L816,188 L652,188" fill="none" stroke="#444" stroke-width="1.5"/>
  <path d="M824,134 L824,196 L652,196" fill="none" stroke="#444" stroke-width="1.5"/>
  <path d="M644,192 L656,185 L656,199 z" fill="#444"/>
  <text x="735" y="180" text-anchor="middle" font-size="10.5" fill="#223344">/navigate_to_pose (action)</text>

  <!-- ===================== controller_manager + cmd_vel + odom ===================== -->
  <rect x="425" y="400" width="240" height="36" rx="8" fill="#DCE9F7" stroke="#7f9dc9" stroke-width="1.5"/>
  <text x="545" y="422" text-anchor="middle" font-size="12" font-weight="700" fill="#223344">/controller_manager (ros2_control)</text>

  <line x1="545" y1="360" x2="545" y2="398" stroke="#444" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="555" y="384" text-anchor="start" font-size="10.5" fill="#223344">/cmd_vel</text>

  <path d="M425,418 L305,418 L305,326" fill="none" stroke="#444" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="360" y="432" text-anchor="middle" font-size="10.5" fill="#223344">/odom (wheel odometry)</text>

  <!-- ===================== RT boundary ===================== -->
  <text x="480" y="462" text-anchor="middle" font-size="11" font-style="italic" fill="#2E5FAC">the graph ends here — below: the 1 kHz RT loop (function calls, no topics)</text>
  <line x1="60" y1="470" x2="900" y2="470" stroke="#2E5FAC" stroke-width="2" stroke-dasharray="7,5"/>

  <rect x="60" y="482" width="840" height="32" rx="8" fill="#ECECEC" stroke="#B0B0B0" stroke-width="1.5"/>
  <text x="480" y="502" text-anchor="middle" font-size="11.5" fill="#333">motors · encoders — EtherCAT / CAN-FD → MCU firmware (FOC)</text>

  <!-- Footnote -->
  <text x="480" y="575" text-anchor="middle" font-size="11" font-style="italic" fill="#555">node/topic names from the audited wheeled-AMR stack (ros2_control · EKF · slam_toolbox + AMCL · Nav2/MPPI); our own captured mini-graph: docs/img/demo1_node_list.txt</text>
</svg>
