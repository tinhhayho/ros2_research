<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 600" width="960" height="600" font-family="'Segoe UI','Helvetica Neue',Arial,sans-serif">
  <rect x="0" y="0" width="960" height="600" fill="#ffffff"/>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L9,3 L0,6 z" fill="#444"/>
    </marker>
  </defs>

  <!-- Title -->
  <text x="480" y="42" text-anchor="middle" font-size="26" font-weight="700" fill="#1b2b4a">QoS compatibility — Request vs Offered (RxO)</text>

  <!-- Rule banner -->
  <rect x="80" y="62" width="800" height="48" rx="8" fill="#DCE9F7" stroke="#6F9BD1" stroke-width="1.5"/>
  <text x="480" y="92" text-anchor="middle" font-size="17" font-weight="600" fill="#234">A connection forms only if OFFERED &#8805; REQUESTED, for every policy (AND).</text>

  <!-- ============ ROW A : incompatible ============ -->
  <rect x="30" y="158" width="6" height="84" rx="3" fill="#d98b91"/>
  <text x="46" y="192" font-size="14" font-weight="700" fill="#333">ROW A</text>
  <text x="46" y="212" font-size="12" font-style="italic" fill="#8a2b32">incompatible</text>

  <!-- Publisher A -->
  <rect x="150" y="158" width="195" height="84" rx="8" fill="#DCE9F7" stroke="#6F9BD1" stroke-width="1.5"/>
  <text x="247" y="190" text-anchor="middle" font-size="13" fill="#234">PUBLISHER offers</text>
  <text x="247" y="216" text-anchor="middle" font-size="17" font-weight="700" fill="#234">best_effort</text>

  <!-- arrow A (red, crossed out) -->
  <line x1="345" y1="200" x2="460" y2="200" stroke="#c0392b" stroke-width="2.5" marker-end="url(#arrow)"/>
  <circle cx="402" cy="200" r="15" fill="#ffffff" stroke="#c0392b" stroke-width="2"/>
  <line x1="394" y1="192" x2="410" y2="208" stroke="#c0392b" stroke-width="3.5" stroke-linecap="round"/>
  <line x1="410" y1="192" x2="394" y2="208" stroke="#c0392b" stroke-width="3.5" stroke-linecap="round"/>
  <text x="402" y="236" text-anchor="middle" font-size="12" font-style="italic" fill="#8a2b32">best_effort &lt; reliable</text>

  <!-- Subscriber A -->
  <rect x="465" y="158" width="195" height="84" rx="8" fill="#DCE9F7" stroke="#6F9BD1" stroke-width="1.5"/>
  <text x="562" y="190" text-anchor="middle" font-size="13" fill="#234">SUBSCRIBER requests</text>
  <text x="562" y="216" text-anchor="middle" font-size="17" font-weight="700" fill="#234">reliable</text>

  <!-- connector to result A -->
  <line x1="660" y1="200" x2="696" y2="200" stroke="#444" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- result chip A -->
  <rect x="700" y="170" width="220" height="60" rx="8" fill="#F8D7DA" stroke="#d98b91" stroke-width="1.5"/>
  <text x="810" y="195" text-anchor="middle" font-size="14" font-weight="700" fill="#8a2b32">0 messages delivered</text>
  <text x="810" y="214" text-anchor="middle" font-size="12" font-style="italic" fill="#8a2b32">(incompatible)</text>

  <!-- ============ ROW B : compatible ============ -->
  <rect x="30" y="300" width="6" height="84" rx="3" fill="#6Fae6f"/>
  <text x="46" y="334" font-size="14" font-weight="700" fill="#333">ROW B</text>
  <text x="46" y="354" font-size="12" font-style="italic" fill="#2d5a2d">compatible</text>

  <!-- Publisher B -->
  <rect x="150" y="300" width="195" height="84" rx="8" fill="#DCE9F7" stroke="#6F9BD1" stroke-width="1.5"/>
  <text x="247" y="332" text-anchor="middle" font-size="13" fill="#234">PUBLISHER offers</text>
  <text x="247" y="358" text-anchor="middle" font-size="17" font-weight="700" fill="#234">reliable</text>

  <!-- arrow B (green) -->
  <line x1="345" y1="342" x2="460" y2="342" stroke="#4a8f4a" stroke-width="2.5" marker-end="url(#arrow)"/>
  <text x="402" y="378" text-anchor="middle" font-size="12" font-style="italic" fill="#2d5a2d">reliable &#8805; best_effort</text>

  <!-- Subscriber B -->
  <rect x="465" y="300" width="195" height="84" rx="8" fill="#DCE9F7" stroke="#6F9BD1" stroke-width="1.5"/>
  <text x="562" y="332" text-anchor="middle" font-size="13" fill="#234">SUBSCRIBER requests</text>
  <text x="562" y="358" text-anchor="middle" font-size="17" font-weight="700" fill="#234">best_effort</text>

  <!-- connector to result B -->
  <line x1="660" y1="342" x2="696" y2="342" stroke="#444" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- result chip B -->
  <rect x="700" y="312" width="220" height="60" rx="8" fill="#DFF0D8" stroke="#6Fae6f" stroke-width="1.5"/>
  <text x="810" y="337" text-anchor="middle" font-size="14" font-weight="700" fill="#2d5a2d">messages flow</text>
  <text x="810" y="356" text-anchor="middle" font-size="12" font-style="italic" fill="#2d5a2d">(offered &gt; requested)</text>

  <!-- ============ Note box ============ -->
  <rect x="80" y="436" width="800" height="132" rx="8" fill="#ECECEC" stroke="#B0B0B0" stroke-width="1.5"/>
  <text x="104" y="464" font-size="14" font-weight="700" fill="#333">Notes</text>
  <text x="104" y="492" font-size="13" font-style="italic" fill="#666">Only reliability, durability, deadline, and liveliness participate in RxO matching.</text>
  <text x="104" y="516" font-size="13" font-style="italic" fill="#666">History / Depth / Lifespan do NOT affect compatibility.</text>
  <text x="104" y="540" font-size="13" font-style="italic" fill="#666">An incompatible match logs a warning — it is not silent.</text>
</svg>