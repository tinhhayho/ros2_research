<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 600" width="960" height="600" font-family="Helvetica, Arial, sans-serif">
  <rect x="0" y="0" width="960" height="600" fill="#ffffff"/>

  <defs>
    <marker id="arr" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L9,3 L0,6 z" fill="#444"/>
    </marker>
    <marker id="arrb" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L9,3 L0,6 z" fill="#2E5FAC"/>
    </marker>
  </defs>

  <!-- Title -->
  <text x="480" y="40" text-anchor="middle" font-size="26" font-weight="700" fill="#1b2b4a">Fleet diagnostics end-to-end — where UDS really lives (2026)</text>

  <!-- ===================== Fleet backend (top) ===================== -->
  <rect x="230" y="58" width="500" height="42" rx="8" fill="#DFF0D8" stroke="#8FBF8F" stroke-width="1.5"/>
  <text x="480" y="84" text-anchor="middle" font-size="13.5" fill="#2d5a2d">Fleet backend — telemetry DB · predictive maintenance · OTA campaigns</text>

  <!-- ===================== Wireless link zone ===================== -->
  <line x1="248" y1="104" x2="248" y2="196" stroke="#2E5FAC" stroke-width="1.5" stroke-dasharray="6,4" marker-end="url(#arrb)"/>
  <line x1="712" y1="104" x2="712" y2="196" stroke="#2E5FAC" stroke-width="1.5" stroke-dasharray="6,4" marker-end="url(#arrb)"/>
  <text x="258" y="126" text-anchor="start" font-size="11" fill="#223344">telemetry: MQTT / proprietary telematics (continuous data)</text>
  <text x="702" y="148" text-anchor="end" font-size="11" fill="#223344">diagnostics: SOVD — REST/HTTP + JSON (ISO 17978:2026)</text>
  <text x="480" y="172" text-anchor="middle" font-size="11" font-style="italic" fill="#b04a4a">raw UDS is NOT exposed to the internet</text>

  <!-- ===================== Vehicle boundary ===================== -->
  <rect x="60" y="200" width="840" height="340" rx="8" fill="#EAF1FB" stroke="#2E5FAC" stroke-width="2" stroke-dasharray="7,5"/>
  <text x="90" y="223" font-size="12" font-weight="700" font-style="italic" fill="#2E5FAC">vehicle</text>

  <!-- TCU -->
  <rect x="280" y="232" width="400" height="44" rx="8" fill="#DCE9F7" stroke="#7f9dc9" stroke-width="1.5"/>
  <text x="480" y="259" text-anchor="middle" font-size="13" fill="#223344">TCU — telematics unit (4G/5G modem, TLS + certificates)</text>

  <line x1="480" y1="276" x2="480" y2="292" stroke="#444" stroke-width="2" marker-end="url(#arr)"/>

  <!-- Central gateway -->
  <rect x="110" y="294" width="740" height="48" rx="8" fill="#DCE9F7" stroke="#7f9dc9" stroke-width="1.5"/>
  <text x="480" y="323" text-anchor="middle" font-size="12.5" fill="#223344">central gateway — DoIP gateway + firewall: the security chokepoint; translates external requests into in-vehicle UDS</text>

  <line x1="290" y1="342" x2="290" y2="372" stroke="#444" stroke-width="2" marker-end="url(#arr)"/>
  <line x1="670" y1="342" x2="670" y2="372" stroke="#444" stroke-width="2" marker-end="url(#arr)"/>

  <!-- Network branches -->
  <rect x="110" y="374" width="360" height="44" rx="8" fill="#EAF1FB" stroke="#9BBCE0" stroke-width="1.5"/>
  <text x="290" y="401" text-anchor="middle" font-size="12.5" fill="#234">Ethernet backbone — DoIP/UDS + SOME/IP</text>

  <rect x="490" y="374" width="360" height="44" rx="8" fill="#EAF1FB" stroke="#9BBCE0" stroke-width="1.5"/>
  <text x="670" y="401" text-anchor="middle" font-size="12.5" fill="#234">CAN / CAN-FD branches — CanTp/UDS</text>

  <line x1="290" y1="418" x2="200" y2="446" stroke="#444" stroke-width="2" marker-end="url(#arr)"/>
  <line x1="670" y1="418" x2="480" y2="446" stroke="#444" stroke-width="2" marker-end="url(#arr)"/>
  <line x1="670" y1="418" x2="760" y2="446" stroke="#444" stroke-width="2" marker-end="url(#arr)"/>

  <!-- Bottom compute row -->
  <rect x="70" y="446" width="260" height="64" rx="8" fill="#FCE8D5" stroke="#E0A96D" stroke-width="1.5"/>
  <text x="200" y="465" text-anchor="middle" font-size="11.5" fill="#6B4A2B">HPC / central computer —</text>
  <text x="200" y="482" text-anchor="middle" font-size="11.5" fill="#6B4A2B">Adaptive DM (ara::diag),</text>
  <text x="200" y="499" text-anchor="middle" font-size="11.5" fill="#6B4A2B">UCM for OTA install</text>

  <rect x="350" y="446" width="260" height="64" rx="8" fill="#FCE8D5" stroke="#E0A96D" stroke-width="1.5"/>
  <text x="480" y="482" text-anchor="middle" font-size="11.5" fill="#6B4A2B">zonal/domain ECUs — Classic DCM + DEM</text>

  <rect x="630" y="446" width="260" height="64" rx="8" fill="#FCE8D5" stroke="#E0A96D" stroke-width="1.5"/>
  <text x="760" y="482" text-anchor="middle" font-size="11.5" fill="#6B4A2B">legacy ECUs — Classic DCM + DEM</text>

  <!-- Footnote -->
  <text x="480" y="575" text-anchor="middle" font-size="11" font-style="italic" fill="#555">UDS 0x2A periodic reads exist, but continuous fleet telemetry runs on telematics pipelines — UDS stays a diagnostic protocol</text>
</svg>
