<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 600" width="960" height="600" font-family="'Segoe UI','Helvetica Neue',Arial,sans-serif">
  <rect x="0" y="0" width="960" height="600" fill="#ffffff"/>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L9,3 L0,6 z" fill="#444"/>
    </marker>
  </defs>

  <!-- Title -->
  <text x="480" y="46" text-anchor="middle" font-size="26" font-weight="700" fill="#1b2b4a">Reliable QoS = ARQ over UDP (RTPS)</text>
  <text x="480" y="66" text-anchor="middle" font-size="13" font-style="italic" fill="#666">A reliability handshake layered on top of unreliable UDP datagrams</text>

  <!-- Dashed lifelines -->
  <line x1="200" y1="118" x2="200" y2="566" stroke="#9aa6b5" stroke-width="1.5" stroke-dasharray="4 5"/>
  <line x1="530" y1="118" x2="530" y2="566" stroke="#9aa6b5" stroke-width="1.5" stroke-dasharray="4 5"/>

  <!-- Lifeline header boxes -->
  <rect x="120" y="80" width="160" height="38" rx="8" fill="#DCE9F7" stroke="#6F9BD1"/>
  <text x="200" y="104" text-anchor="middle" font-size="15" fill="#234">Publisher (Writer)</text>
  <rect x="450" y="80" width="160" height="38" rx="8" fill="#DCE9F7" stroke="#6F9BD1"/>
  <text x="530" y="104" text-anchor="middle" font-size="14" fill="#234">Subscriber (Reader)</text>

  <!-- Recovery bracket (left gutter) -->
  <line x1="146" y1="315" x2="146" y2="505" stroke="#6Fae6f" stroke-width="2"/>
  <line x1="146" y1="315" x2="156" y2="315" stroke="#6Fae6f" stroke-width="2"/>
  <line x1="146" y1="505" x2="156" y2="505" stroke="#6Fae6f" stroke-width="2"/>
  <text x="134" y="410" text-anchor="middle" font-size="13" font-style="italic" fill="#2d5a2d" transform="rotate(-90 134 410)">loss recovery (ARQ)</text>

  <!-- Arrow 1: DATA seq=1 -->
  <text x="365" y="158" text-anchor="middle" font-size="14" fill="#234">DATA  seq=1</text>
  <line x1="200" y1="165" x2="530" y2="165" stroke="#444" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Arrow 2: DATA seq=2 LOST -->
  <text x="282" y="210" text-anchor="middle" font-size="14" fill="#8a2b32">DATA  seq=2  (LOST)</text>
  <line x1="200" y1="220" x2="350" y2="220" stroke="#d98b91" stroke-width="2.5" stroke-dasharray="6 4"/>
  <line x1="362" y1="212" x2="380" y2="230" stroke="#8a2b32" stroke-width="2.5"/>
  <line x1="380" y1="212" x2="362" y2="230" stroke="#8a2b32" stroke-width="2.5"/>
  <text x="371" y="246" text-anchor="middle" font-size="12" font-style="italic" fill="#8a2b32">dropped on the wire</text>

  <!-- Arrow 3: DATA seq=3 -->
  <text x="365" y="268" text-anchor="middle" font-size="14" fill="#234">DATA  seq=3</text>
  <line x1="200" y1="275" x2="530" y2="275" stroke="#444" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Arrow 4: HEARTBEAT -->
  <text x="365" y="323" text-anchor="middle" font-size="14" fill="#234">HEARTBEAT  (I have 1..3)</text>
  <line x1="200" y1="330" x2="530" y2="330" stroke="#444" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Arrow 5: ACKNACK have 1,3 NACK 2 -->
  <text x="365" y="378" text-anchor="middle" font-size="14" fill="#234">ACKNACK  (have 1,3 - NACK 2)</text>
  <line x1="530" y1="385" x2="200" y2="385" stroke="#444" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Arrow 6: DATA seq=2 retransmit (green) -->
  <text x="365" y="433" text-anchor="middle" font-size="14" fill="#2d5a2d">DATA  seq=2  (retransmit)</text>
  <line x1="200" y1="440" x2="530" y2="440" stroke="#3f8f4a" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Arrow 7: ACKNACK have 1..3 (green) -->
  <text x="365" y="488" text-anchor="middle" font-size="14" fill="#2d5a2d">ACKNACK  (have 1..3)</text>
  <line x1="530" y1="495" x2="200" y2="495" stroke="#3f8f4a" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Footer caption -->
  <text x="365" y="552" text-anchor="middle" font-size="13" font-style="italic" fill="#666">Reliable = retransmit until acknowledged. Best-effort = fire and forget.</text>

  <!-- Right-side firmware caption box -->
  <rect x="628" y="150" width="302" height="300" rx="8" fill="#ECECEC" stroke="#B0B0B0"/>
  <text x="648" y="182" font-size="15" font-weight="700" fill="#333">Maps to firmware concepts</text>
  <line x1="648" y1="194" x2="910" y2="194" stroke="#B0B0B0" stroke-width="1"/>

  <text x="648" y="228" font-size="13" font-weight="700" fill="#234">HEARTBEAT</text>
  <text x="648" y="246" font-size="13" fill="#333">&#8776;  window poll</text>

  <text x="648" y="282" font-size="13" font-weight="700" fill="#234">ACKNACK</text>
  <text x="648" y="300" font-size="13" fill="#333">&#8776;  selective ACK / NACK</text>

  <text x="648" y="336" font-size="13" font-weight="700" fill="#2d5a2d">retransmit</text>
  <text x="648" y="354" font-size="13" fill="#2d5a2d">&#8776;  ARQ retry</text>

  <text x="648" y="390" font-size="13" font-weight="700" fill="#8a2b32">BEST_EFFORT</text>
  <text x="648" y="408" font-size="13" fill="#8a2b32">&#8776;  raw UDP (no retries)</text>

  <text x="648" y="436" font-size="12" font-style="italic" fill="#666">All of this rides over plain UDP.</text>
</svg>